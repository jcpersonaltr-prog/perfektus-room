function playSound(name){try{var a=new Audio(SFX[name]);a.volume=0.9;a.play().catch(function(){});}catch(e){}}
function beepTone(hz,dur,vol){try{var ac=new(window.AudioContext||window.webkitAudioContext)();var o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.frequency.value=hz||880;o.type='sine';g.gain.setValueAtTime(vol||.5,ac.currentTime);g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||.18));o.start();o.stop(ac.currentTime+(dur||.18)+.05);setTimeout(function(){try{ac.close();}catch(e){};},((dur||.18)+.2)*1000);}catch(e){}}

/* ══ HELPERS ══ */
function fmt(s){if(s>=60)return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;return s<10?'0'+s:''+s;}
function toCode(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}
function el(tag,css){var e=document.createElement(tag);if(css)e.style.cssText=css;return e;}
function div(css){return el('div',css);}
function btn(text,css,onclick){var b=el('button',css);b.innerHTML=text;if(onclick)b.onclick=onclick;return b;}
function loadPeer(cb){
  if(window.Peer){cb();return;}
  var s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
  s.onload=cb;
  s.onerror=function(){var s2=document.createElement('script');s2.src='https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js';s2.onload=cb;document.head.appendChild(s2);};
  document.head.appendChild(s);
}

/* ══ GRID LAYOUT ══ */
function gridLayout(n){
  if(n===1)return{cols:1,rows:1};
  if(n===2)return{cols:2,rows:1};
  if(n===3)return{cols:3,rows:1};
  if(n===4)return{cols:2,rows:2};
  if(n<=6)return{cols:3,rows:2};
  if(n<=9)return{cols:3,rows:3};
  return{cols:4,rows:Math.ceil(n/4)};
}
function applyGrid(){
  var grid=document.getElementById('video-grid');if(!grid)return;
  var n=1+Object.keys(S.remotes).length;
  var lay=gridLayout(n);
  grid.style.gridTemplateColumns='repeat('+lay.cols+',1fr)';
  grid.style.gridTemplateRows='repeat('+lay.rows+',1fr)';
}

/* ══ TIMER ══ */
function killTimer(){clearInterval(S.timerIv);}
function applyCmd(cmd){
  if(cmd.action==='stop'){killTimer();S.timerOn=false;S.timer.phase='idle';S.timer.left=0;updateOverlay();return;}
  if(cmd.action==='reset'){killTimer();S.timerOn=false;S.timer={phase:'idle',round:0,total:0,left:0};updateOverlay();return;}
  if(cmd.action==='start'){
    killTimer();
    var w=cmd.work,r=cmd.rest,rds=cmd.rounds;
    S.ts={phase:'work',round:1,work:w,rest:r,total:rds,left:w};
    S.timerOn=true;S.timer={phase:'work',round:1,total:rds,left:w};
    showOverlay();beepTone(880,.3,.7);
    S.timerIv=setInterval(function(){
      var ts=S.ts;ts.left-=1;
      // Last 3s of WORK: beep each second
      if(ts.phase==='work'&&ts.left>0&&ts.left<=3) playSound('beep');
      if(ts.left<=0){
        if(ts.phase==='work'){
          playSound('apito'); // whistle end of work round
          if(ts.round>=ts.total){clearInterval(S.timerIv);ts.phase='done';S.timer={phase:'done',round:ts.round,total:ts.total,left:0};S.timerOn=true;showOverlay();fanfare();return;}
          ts.phase='rest';ts.left=ts.rest;S.timer={phase:'rest',round:ts.round,total:ts.total,left:ts.rest};
        } else {
          ts.round++;ts.phase='work';ts.left=ts.work;S.timer={phase:'work',round:ts.round,total:ts.total,left:ts.work};beepTone(880,.3,.7);
        }
        showOverlay();
      } else {
        S.timer.left=ts.left;
        var bn=document.getElementById('t-big');if(bn)bn.textContent=fmt(ts.left);
      }
    },1000);
  }
}
function bcast(cmd){Object.values(S.conns).forEach(function(c){try{c.send(cmd);}catch(e){}});}

/* ══ JOIN ══ */
function joinRoom(asHost){
  if(!S.roomId.trim())return;
  var code=toCode(S.roomId);
  if(!code){setStatus('Nome de sala invalido — usa letras e numeros.','err');return;}
  S.isHost=asHost;S.page='room';setStatus('A iniciar camera...','info');render();
  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(stream){
    S.localStream=stream;
    var lv=document.getElementById('local-video');if(lv)lv.srcObject=stream;
    setStatus('A ligar...','info');
    loadPeer(function(){
      var hostId='pm'+code+'host';
      var myId=asHost?hostId:'pm'+code+'p'+Date.now();
      var peer=new window.Peer(myId,{debug:0,config:{iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'},{urls:'stun:stun.cloudflare.com:3478'}]}});
      S.peer=peer;
      peer.on('open',function(){
        setStatus(asHost?'Sala aberta — aguarda clientes...':'Ligado!','ok');
        if(!asHost){
          var conn=peer.connect(hostId,{reliable:true,metadata:{name:S.myName||'Participante'}});
          conn.on('open',function(){S.conns[hostId]=conn;conn.on('data',applyCmd);conn.on('close',function(){delete S.conns[hostId];});});
          var call=peer.call(hostId,stream,{metadata:{name:S.myName||'Participante'}});
          if(call){S.calls[hostId]=call;call.on('stream',function(rs){addRemote(hostId,'Trainer',rs);setStatus('','ok');});call.on('close',function(){removeRemote(hostId);});}
        }
      });
      peer.on('connection',function(conn){
        var name=conn.metadata&&conn.metadata.name?conn.metadata.name:'Participante';
        S.conns[conn.peer]=conn;
        conn.on('close',function(){delete S.conns[conn.peer];removeRemote(conn.peer);});
        setTimeout(function(){
          if(!S.peer)return;
          var call=S.peer.call(conn.peer,stream,{metadata:{name:S.myName||'Trainer'}});
          if(call){call.on('stream',function(rs){S.calls[conn.peer]=call;addRemote(conn.peer,name,rs);setStatus('','ok');});call.on('close',function(){delete S.calls[conn.peer];removeRemote(conn.peer);});}
        },600);
      });
      peer.on('call',function(call){
        call.answer(stream);
        var name=call.metadata&&call.metadata.name?call.metadata.name:(asHost?'Participante':'Trainer');
        call.on('stream',function(rs){S.calls[call.peer]=call;addRemote(call.peer,name,rs);setStatus('','ok');});
        call.on('close',function(){delete S.calls[call.peer];removeRemote(call.peer);});
      });
      peer.on('error',function(err){
        var m={'unavailable-id':'Sala ja ocupada — escolhe outro nome.','peer-unavailable':'Trainer nao encontrado — certifica-te que ja esta na sala.','invalid-id':'Nome de sala invalido.','network':'Erro de rede.','server-error':'Servidor indisponivel, tenta novamente.'};
        setStatus(m[err.type]||'Erro: '+err.type,'err');
      });
    });
  }).catch(function(e){S.page='landing';S.status=e.name==='NotAllowedError'?'Camera/microfone bloqueado.':'Erro: '+e.message;S.statusType='err';render();});
}
function addRemote(id,name,stream){
  var v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.setAttribute('playsinline','');v.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';v.srcObject=stream;
  S.remotes[id]={name:name,stream:stream,videoEl:v};rebuildGrid();
}
function removeRemote(id){delete S.remotes[id];rebuildGrid();}
function leaveRoom(){
  killTimer();if(S.localStream)S.localStream.getTracks().forEach(function(t){t.stop();});
  if(S.peer)S.peer.destroy();
  S.peer=null;S.calls={};S.conns={};S.localStream=null;S.remotes={};S.timerOn=false;S.panelOpen=false;
  S.timer={phase:'idle',round:0,total:0,left:0};S.page='landing';S.status='';render();
}
function setStatus(txt,type){S.status=txt;S.statusType=type||'info';var e=document.getElementById('room-status');if(!e)return;e.textContent=txt;e.style.color=type==='err'?'#ff6070':type==='ok'?'#00cc66':'#2a4a6a';}

/* ══ OVERLAY ══ */

  renderTimerContent();
}
function updateOverlay(){var ov=document.getElementById('timer-overlay');if(ov)ov.style.display=S.timerOn?'flex':'none';if(S.timerOn)showOverlay();}

  var bn=div('color:#fff;font-size:'+(S.timer.phase==='done'?'74':'104')+'px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-4px;text-shadow:0 0 70px '+pi.c+'80,0 4px 16px rgba(0,0,0,.95);');
  bn.id='t-big';bn.textContent=S.timer.phase==='done'?'🏆':fmt(S.timer.left);box.appendChild(bn);
  if(S.timer.phase==='work'||S.timer.phase==='rest'){var ri=div('color:#1a2a3a;font-size:13px;margin-top:12px;letter-spacing:1px');ri.innerHTML='ROUND <b style="color:'+pi.c+';font-size:16px">'+S.timer.round+'</b> / '+S.timer.total;box.appendChild(ri);}
  if(S.timer.phase==='done'){
    var dl=div('color:#ffd700;font-size:20px;font-weight:800;margin-top:12px;');dl.textContent='SESSAO COMPLETA!';box.appendChild(dl);
    var cb=btn('Fechar x','margin-top:20px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.28);color:#ffd700;border-radius:10px;padding:7px 24px;font-size:12px;font-weight:700;');
    cb.onclick=function(){S.timerOn=false;S.timer={phase:'idle',round:0,total:0,left:0};updateOverlay();};box.appendChild(cb);
  }
  if(S.timer.total>0&&S.timer.total<=20&&S.timer.phase!=='done'){
    var dots=div('display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:16px;max-width:240px;margin-left:auto;margin-right:auto;');
    for(var i=0;i<S.timer.total;i++){var d=div('border-radius:50%;flex-shrink:0;');var cur=i===S.timer.round-1,dn=i<S.timer.round-1;d.style.width=(cur?11:7)+'px';d.style.height=(cur?11:7)+'px';d.style.background=dn?'#1a3a28':cur?pi.c:'rgba(255,255,255,0.07)';dots.appendChild(d);}
    box.appendChild(dots);
  }
}

/* ══ LANDING ══ */
function renderLanding(){
  var app=document.getElementById('app');app.innerHTML='';
  app.style.cssText='min-height:100vh;background:radial-gradient(ellipse 90% 70% at 40% 30%,#091828 0%,#030508 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;';
  var logo=div('text-align:center;margin-bottom:36px;');
  logo.innerHTML='<div style="font-size:52px;filter:drop-shadow(0 0 26px rgba(0,255,136,.6));line-height:1">&#9889;</div><div style="color:#00ff88;font-weight:900;font-size:26px;letter-spacing:10px;margin-top:10px;text-shadow:0 0 40px rgba(0,255,136,.4)">PERFEKTUS</div><div style="color:#0d1e2a;font-size:10px;letter-spacing:6px;margin-top:4px">TRAINING ROOM</div>';
  app.appendChild(logo);
  var card=div('background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:30px 32px;width:100%;max-width:420px;box-shadow:0 30px 100px rgba(0,0,0,.8);');
  app.appendChild(card);
  if(S.status){var sd=div('background:rgba(255,40,70,0.09);border:1px solid rgba(255,40,70,0.18);border-radius:10px;padding:10px 14px;margin-bottom:14px;color:#ff8090;font-size:13px');sd.textContent=S.status;card.appendChild(sd);S.status='';}
  function lbl(t){var l=div('color:#0e1c28;font-size:10px;letter-spacing:2.5px;margin-bottom:7px');l.textContent=t;return l;}
  function inp(ph,val,fn){var i=document.createElement('input');i.type='text';i.placeholder=ph;i.value=val||'';i.style.cssText='width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;color:#fff;font-size:15px;margin-bottom:16px;display:block;';i.oninput=fn;return i;}
  card.appendChild(lbl('NOME DA SALA'));
  var ri=inp('ex: joaotreino (so letras e numeros)',S.roomId,function(){S.roomId=this.value.toLowerCase().replace(/[^a-z0-9]/g,'');this.value=S.roomId;var sl=document.getElementById('sl');if(sl)sl.textContent=getUrl(S.roomId);});
  card.appendChild(ri);
  card.appendChild(lbl('O TEU NOME'));
  var ni=inp('ex: Joao',S.myName,function(){S.myName=this.value;});
  card.appendChild(ni);
  var tb=btn('&#9889; ENTRAR COMO TRAINER','width:100%;padding:14px;margin-top:4px;background:#00ff88;color:#000;border-radius:14px;font-weight:900;font-size:14px;letter-spacing:1px;');
  tb.onclick=function(){S.myName=ni.value;joinRoom(true);};card.appendChild(tb);
  card.appendChild(div('height:8px'));
  var pb=btn('ENTRAR COMO PARTICIPANTE','width:100%;padding:13px;background:transparent;color:#00ff88;border:1px solid rgba(0,255,136,0.28);border-radius:14px;font-weight:600;font-size:13px;');
  pb.onclick=function(){S.myName=ni.value;joinRoom(false);};card.appendChild(pb);
  var sb=div('margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.04);');
  var slbl=div('color:#0d1a24;font-size:9px;letter-spacing:2.5px;margin-bottom:8px');slbl.textContent='LINK PARA CLIENTES';sb.appendChild(slbl);
  var lr=div('background:rgba(0,255,136,0.04);border:1px solid rgba(0,255,136,0.11);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;');
  var ls=el('span','color:#0a6a45;font-size:11px;flex:1;word-break:break-all;line-height:1.5;');ls.id='sl';ls.textContent=getUrl(S.roomId);
  var cp=btn('&#128203;','background:rgba(0,255,136,0.15);border:none;color:#00ff88;border-radius:6px;padding:5px 10px;font-size:14px;flex-shrink:0;');
  cp.onclick=function(){navigator.clipboard.writeText(document.getElementById('sl').textContent).catch(function(){});cp.innerHTML='&#10003;';setTimeout(function(){cp.innerHTML='&#128203;';},1500);};
  lr.appendChild(ls);lr.appendChild(cp);sb.appendChild(lr);card.appendChild(sb);
}
function getUrl(r){return location.origin+location.pathname+(r?'?room='+encodeURIComponent(r):'?room=');}

/* ══ ROOM ══ */
function renderRoom(){
  var app=document.getElementById('app');app.innerHTML='';
  app.style.cssText='position:fixed;inset:0;background:#03050a;display:flex;flex-direction:column;overflow:hidden;';
  // TOP BAR
  var bar=div('display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(2,4,9,0.98);border-bottom:1px solid rgba(0,255,136,0.07);flex-shrink:0;z-index:20;');
  bar.innerHTML='<span style="color:#00ff88;font-weight:900;font-size:17px">&#9889;</span><span style="color:#00cc66;font-weight:800;font-size:11px;letter-spacing:4px">PERFEKTUS</span><span style="color:#0c1a26;font-size:10px;margin:0 2px">|</span><span style="color:#172535;font-size:10px">'+S.roomId+'</span>';
  if(S.isHost){var chip=el('span','background:rgba(0,255,136,0.1);color:#009955;font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:2px;font-weight:700');chip.textContent='TRAINER';bar.appendChild(chip);}
  var se=el('span','font-size:10px;margin-left:2px;color:#2a4a6a;');se.id='room-status';se.textContent=S.status;bar.appendChild(se);
  var br=div('margin-left:auto;display:flex;gap:6px;align-items:center;');
  var pc=el('span','background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.1);color:#007744;font-size:10px;padding:3px 8px;border-radius:6px;display:none;');pc.id='pcount';br.appendChild(pc);
  var lb=btn('&#128203;','background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#2a3a4a;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;');
  lb.onclick=function(){navigator.clipboard.writeText(getUrl(S.roomId)).catch(function(){});lb.innerHTML='&#10003;';setTimeout(function(){lb.innerHTML='&#128203;';},1500);};
  br.appendChild(lb);
  if(S.isHost){
    var ttb=btn('&#9201; Timer','background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#2a3a4a;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;');
    ttb.id='ttb';
    ttb.onclick=function(){S.panelOpen=!S.panelOpen;var p=document.getElementById('tp');if(p)p.style.display=S.panelOpen?'block':'none';ttb.style.background=S.panelOpen?'#00ff88':'rgba(255,255,255,0.04)';ttb.style.color=S.panelOpen?'#000':'#2a3a4a';};
    br.appendChild(ttb);
  }
  bar.appendChild(br);app.appendChild(bar);
  // GRID
  var grid=div('flex:1;display:grid;gap:4px;padding:4px;background:#010308;position:relative;overflow:hidden;');
  grid.id='video-grid';grid.style.gridTemplateColumns='1fr';grid.style.gridTemplateRows='1fr';
  app.appendChild(grid);
  // Local tile
  var lt=div('');lt.className='vtile';lt.id='local-tile';
  var lv=document.createElement('video');lv.autoplay=true;lv.muted=true;lv.playsInline=true;lv.setAttribute('playsinline','');
  lv.id='local-video';lv.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1);';
  if(S.localStream)lv.srcObject=S.localStream;lt.appendChild(lv);
  var ll=div('position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.65);color:#8a9aaa;font-size:11px;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px);z-index:2;');
  ll.textContent=S.myName||(S.isHost?'Tu (Trainer)':'Tu');lt.appendChild(ll);
  grid.appendChild(lt);
  // Waiting
  var wt=div('vtile');wt.id='wait-tile';wt.style.cssText='display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;';
  var sp=div('width:28px;height:28px;border:3px solid rgba(0,255,136,0.15);border-top-color:#00ff88;border-radius:50%;animation:spin .9s linear infinite;');
  var wm=div('color:#0e1c2e;font-size:13px;text-align:center;padding:0 20px;line-height:1.7;');wm.textContent=S.isHost?'A aguardar participantes...':'A ligar ao trainer...';
  wt.appendChild(sp);wt.appendChild(wm);grid.appendChild(wt);
  // Timer overlay
  var ov=div('position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;');
  ov.id='timer-overlay';
  var pi=PH.idle;
  var tbox=div('backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:3px solid '+pi.c+';border-radius:34px;padding:36px 68px;text-align:center;min-width:270px;pointer-events:auto;animation:glow 2.4s ease-in-out infinite;background:'+pi.bg+';');
  tbox.id='timer-box';tbox.style.setProperty('--gc',pi.c+'44');
  ov.appendChild(tbox);grid.appendChild(ov);
  if(S.timerOn){ov.style.display='flex';renderTimerContent();}
  applyGrid();
  // Panel
  var panel=div('position:fixed;bottom:76px;right:18px;z-index:300;background:rgba(2,5,13,0.99);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(0,255,136,0.18);border-radius:22px;padding:22px 24px;width:310px;box-shadow:0 24px 80px rgba(0,0,0,.95);display:none;');
  panel.id='tp';buildPanel(panel);app.appendChild(panel);
  // Bottom bar
  var bot=div('display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 20px;background:rgba(2,4,9,0.98);border-top:1px solid rgba(255,255,255,0.03);flex-shrink:0;z-index:20;');
  function cbtn(icon,lbl,fn){var b=btn(icon,'background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#8a9aaa;padding:8px 14px;border-radius:50px;font-size:15px;display:flex;flex-direction:column;align-items:center;gap:2px;');var l=document.createElement('div');l.textContent=lbl;l.style.cssText='font-size:9px;color:#8a9aaa;';b.appendChild(l);b.onclick=fn;return b;}
  var micBtn=cbtn('&#127897;','Mic',function(){var t=S.localStream&&S.localStream.getAudioTracks()[0];if(t){t.enabled=!t.enabled;micBtn.childNodes[0].nodeValue=t.enabled?'\uD83C\uDF99\uFE0F':'\uD83D\uDD07';}});
  var camBtn=cbtn('&#128247;','Cam',function(){var t=S.localStream&&S.localStream.getVideoTracks()[0];if(t){t.enabled=!t.enabled;var lv2=document.getElementById('local-video');if(lv2)lv2.style.opacity=t.enabled?1:0.12;}});
  var lvBtn=btn('Sair','background:rgba(255,30,60,0.14);color:#ff3d5a;border:1px solid rgba(255,30,60,0.25);padding:10px 24px;border-radius:50px;font-weight:700;font-size:13px;');
  lvBtn.onclick=leaveRoom;
  bot.appendChild(micBtn);bot.appendChild(camBtn);bot.appendChild(lvBtn);app.appendChild(bot);
}

function rebuildGrid(){
  var grid=document.getElementById('video-grid');if(!grid){renderRoom();return;}
  grid.querySelectorAll('.remote-tile').forEach(function(t){t.parentNode.removeChild(t);});
  var oldOv=document.getElementById('timer-overlay');if(oldOv)oldOv.parentNode.removeChild(oldOv);
  var n=Object.keys(S.remotes).length;
  var wt=document.getElementById('wait-tile');if(wt)wt.style.display=n===0?'flex':'none';
  Object.keys(S.remotes).forEach(function(id){
    var rem=S.remotes[id];
    var tile=div('');tile.className='vtile remote-tile';tile.id='tile-'+id;
    var v=rem.videoEl;if(!v){v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.setAttribute('playsinline','');v.style.cssText='position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';v.srcObject=rem.stream;rem.videoEl=v;}
    tile.appendChild(v);
    var lbl=div('position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,0.65);color:#8a9aaa;font-size:11px;padding:3px 10px;border-radius:6px;backdrop-filter:blur(4px);z-index:2;');
    lbl.textContent=rem.name;tile.appendChild(lbl);
    grid.appendChild(tile);
  });
  var pi=PH[S.timer.phase]||PH.idle;
  var ov=div('position:absolute;inset:0;z-index:50;display:'+(S.timerOn?'flex':'none')+';align-items:center;justify-content:center;pointer-events:none;');
  ov.id='timer-overlay';
  var tbox=div('backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:3px solid '+pi.c+';border-radius:34px;padding:36px 68px;text-align:center;min-width:270px;pointer-events:auto;animation:glow 2.4s ease-in-out infinite;background:'+pi.bg+';');
  tbox.id='timer-box';tbox.style.setProperty('--gc',pi.c+'44');
  ov.appendChild(tbox);grid.appendChild(ov);
  if(S.timerOn)renderTimerContent();
  applyGrid();
  var pc=document.getElementById('pcount');if(pc){pc.style.display=n?'inline-block':'none';pc.textContent='&#128101; '+n;}
  var pp=document.getElementById('panel-pcount');if(pp)pp.textContent=n===0?'A aguardar clientes...':n+' cliente'+(n>1?'s':'')+' ligado'+(n>1?'s':'');
}

function buildPanel(panel){
  panel.innerHTML='';
  var hdr=div('display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;');
  var title=el('span','color:#00ff88;font-weight:900;font-size:13px;letter-spacing:3px;');title.textContent='HIIT TIMER';
  var cx=btn('x','background:none;border:none;color:#1a2a38;font-size:18px;line-height:1;');
  cx.onclick=function(){S.panelOpen=false;var p=document.getElementById('tp');if(p)p.style.display='none';var ttb=document.getElementById('ttb');if(ttb){ttb.style.background='rgba(255,255,255,0.04)';ttb.style.color='#2a3a4a';}};
  hdr.appendChild(title);hdr.appendChild(cx);panel.appendChild(hdr);
  [{k:'work',label:'TRABALHO (s)',step:5,min:5,max:300},{k:'rest',label:'DESCANSO (s)',step:5,min:5,max:300},{k:'rounds',label:'ROUNDS',step:1,min:1,max:40}].forEach(function(row){
    var w=div('margin-bottom:14px;');
    var l=div('color:#1a2838;font-size:10px;letter-spacing:2px;margin-bottom:6px');l.textContent=row.label;w.appendChild(l);
    var r=div('display:flex;align-items:center;gap:6px;');
    var minus=btn('-','width:36px;height:36px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#3a4a5a;border-radius:9px;font-size:20px;');
    var ve=div('flex:1;text-align:center;color:#fff;font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;');ve.id='cfg-'+row.k;ve.textContent=S.cfg[row.k];
    var plus=btn('+','width:36px;height:36px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#3a4a5a;border-radius:9px;font-size:20px;');
    (function(k,step,mn,mx,ve2){minus.onclick=function(){S.cfg[k]=Math.max(mn,S.cfg[k]-step);ve2.textContent=S.cfg[k];};plus.onclick=function(){S.cfg[k]=Math.min(mx,S.cfg[k]+step);ve2.textContent=S.cfg[k];};})(row.k,row.step,row.min,row.max,ve);
    r.appendChild(minus);r.appendChild(ve);r.appendChild(plus);w.appendChild(r);panel.appendChild(w);
  });
  var pw=div('margin-bottom:16px;');
  var pl=div('color:#0e1c28;font-size:10px;letter-spacing:2px;margin-bottom:8px');pl.textContent='PRESETS';pw.appendChild(pl);
  var pg=div('display:flex;flex-wrap:wrap;gap:5px;');
  PRESETS.forEach(function(p){
    var pb=btn(p.n,'background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.15);color:#009955;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;');
    pb.onclick=function(){S.cfg={work:p.w,rest:p.r,rounds:p.rds};['work','rest','rounds'].forEach(function(k){var e=document.getElementById('cfg-'+k);if(e)e.textContent=S.cfg[k];});};
    pg.appendChild(pb);
  });
  pw.appendChild(pg);panel.appendChild(pw);
  var ac=div('display:flex;gap:6px;margin-bottom:12px;');
  var sb=btn('INICIAR','flex:1;background:#00ff88;color:#000;padding:12px 0;border-radius:12px;font-weight:900;font-size:14px;letter-spacing:1px;');
  sb.onclick=function(){var cmd={action:'start',work:S.cfg.work,rest:S.cfg.rest,rounds:S.cfg.rounds};bcast(cmd);applyCmd(cmd);};
  var pb2=btn('||','background:rgba(255,61,90,0.12);color:#ff3d5a;border:1px solid rgba(255,61,90,0.2);padding:12px 14px;border-radius:12px;font-size:17px;');
  pb2.onclick=function(){var c={action:'stop'};bcast(c);applyCmd(c);};
  var rb=btn('R','background:rgba(255,255,255,0.03);color:#1a2838;border:1px solid rgba(255,255,255,0.05);padding:12px 14px;border-radius:12px;font-size:15px;');
  rb.onclick=function(){var c={action:'reset'};bcast(c);applyCmd(c);};
  ac.appendChild(sb);ac.appendChild(pb2);ac.appendChild(rb);panel.appendChild(ac);
  var pcnt=div('color:#0e1c28;font-size:11px;text-align:center;padding:8px 0;border-top:1px solid rgba(255,255,255,0.04);');
  pcnt.id='panel-pcount';pcnt.textContent='A aguardar clientes...';panel.appendChild(pcnt);
}

/* ══ INIT ══ */
function render(){if(S.page==='landing')renderLanding();else renderRoom();}
var urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom)S.roomId=urlRoom;
render();
</script>
