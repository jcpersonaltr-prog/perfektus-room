<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Perfektus Training Room</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { background: #030508; overflow: hidden; -webkit-font-smoothing: antialiased; }
  input::placeholder { color: #0a1820 !important; }
  input:focus { border-color: rgba(0,255,136,0.35) !important; outline: none; }
  button { font-family: inherit; transition: opacity 0.15s; }
  button:hover:not(:disabled) { opacity: 0.82; }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 0 60px var(--pc,rgba(0,255,136,.25)), 0 40px 100px rgba(0,0,0,.9); }
    50%      { box-shadow: 0 0 130px var(--pc,rgba(0,255,136,.42)), 0 40px 100px rgba(0,0,0,.9); }
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,255,136,0.15); border-radius: 2px; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ══════════════════════════════════════════
   AUDIO UTILS
══════════════════════════════════════════ */
const beep = (hz=880, dur=0.18, vol=0.5) => {
  try {
    const ac = new (window.AudioContext||window.webkitAudioContext)();
    const o = ac.createOscillator(), g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.frequency.value = hz; o.type = "sine";
    g.gain.setValueAtTime(vol, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.start(); o.stop(ac.currentTime + dur + 0.05);
    setTimeout(() => ac.close(), (dur+0.2)*1000);
  } catch(_){}
};
const fanfare = () => {
  beep(880,0.1,0.7);
  setTimeout(()=>beep(1100,0.1,0.6),180);
  setTimeout(()=>beep(1320,0.85,0.8),360);
};

/* ══════════════════════════════════════════
   HELPERS
══════════════════════════════════════════ */
const fmt = s => s>=60 ? `${Math.floor(s/60)}:${String(s%60).padStart(2,"0")}` : String(s).padStart(2,"0");
const slugify = s => s.toLowerCase().replace(/[^a-z0-9]/g,"-").replace(/-+/g,"-");

const loadPeer = () => new Promise(res => {
  if (window.Peer) { res(); return; }
  const el = document.createElement("script");
  el.src = "https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js";
  el.onload = res;
  document.head.appendChild(el);
});

/* ══════════════════════════════════════════
   CONSTANTS
══════════════════════════════════════════ */
const PHASE = {
  idle: { color:"#2a3a50", label:"PRONTO",       bg:"rgba(20,35,55,0.55)"   },
  work: { color:"#00ff88", label:"💪 TRABALHO",  bg:"rgba(0,255,136,0.09)"  },
  rest: { color:"#ff3d5a", label:"😤 DESCANSO",  bg:"rgba(255,61,90,0.09)"  },
  done: { color:"#ffd700", label:"🏆 COMPLETO!", bg:"rgba(255,215,0,0.09)"  },
};

const PRESETS = [
  { n:"Tabata",       w:20,  r:10, rds:8  },
  { n:"40/20",        w:40,  r:20, rds:8  },
  { n:"30/30",        w:30,  r:30, rds:10 },
  { n:"Boxe 3′",      w:180, r:60, rds:6  },
  { n:"AMRAP 5′",     w:300, r:60, rds:5  },
  { n:"Sprint 15/45", w:15,  r:45, rds:12 },
];

/* ══════════════════════════════════════════
   MAIN APP
══════════════════════════════════════════ */
function App() {
  const [page, setPage]     = useState("landing");
  const [isHost, setIsHost] = useState(false);
  const [roomId, setRoomId] = useState("");
  const [myName, setMyName] = useState("");
  const [status, setStatus] = useState("");
  const [errMsg, setErrMsg] = useState("");

  /* Video */
  const localRef    = useRef(null);
  const localStream = useRef(null);
  const [remotes, setRemotes] = useState({});
  const [micOn, setMicOn]     = useState(true);
  const [camOn, setCamOn]     = useState(true);
  const remoteRefs = useRef({});

  /* PeerJS */
  const peerInst = useRef(null);
  const calls    = useRef({});
  const conns    = useRef({});

  /* Timer */
  const [cfg, setCfg]           = useState({ work:40, rest:20, rounds:8 });
  const [timer, setTimer]       = useState({ phase:"idle", round:0, total:0, left:0 });
  const [timerOn, setTimerOn]   = useState(false);
  const [panelOpen, setPanelOpen] = useState(false);
  const ivRef = useRef(null);
  const ts    = useRef({});

  /* Read ?room= from URL */
  useEffect(() => {
    const r = new URLSearchParams(window.location.search).get("room");
    if (r) setRoomId(r);
  }, []);

  /* Sync remote streams */
  useEffect(() => {
    Object.entries(remotes).forEach(([id,{stream}]) => {
      const el = remoteRefs.current[id];
      if (el && el.srcObject !== stream) el.srcObject = stream;
    });
  }, [remotes]);

  /* ─── Timer engine ─── */
  const killTimer = useCallback(()=>clearInterval(ivRef.current),[]);

  const applyCmd = useCallback(cmd => {
    if (cmd.action==="stop") {
      killTimer();
      setTimerOn(false);
      setTimer(p=>({...p, phase:"idle"}));
      return;
    }
    if (cmd.action==="reset") {
      killTimer();
      setTimerOn(false);
      setTimer({phase:"idle",round:0,total:0,left:0});
      return;
    }
    if (cmd.action==="start") {
      killTimer();
      const {work,rest,rounds} = cmd;
      ts.current = {phase:"work",round:1,work,rest,total:rounds,left:work};
      setTimerOn(true);
      setTimer({phase:"work",round:1,total:rounds,left:work});
      beep(880,0.4,0.8);

      ivRef.current = setInterval(()=>{
        const s = ts.current;
        s.left -= 1;
        if (s.left>0 && s.left<=3) beep(660,0.06,0.28);

        if (s.left<=0) {
          if (s.phase==="work") {
            if (s.round >= s.total) {
              clearInterval(ivRef.current);
              s.phase="done";
              setTimer(p=>({...p,phase:"done",left:0}));
              fanfare();
              return;
            }
            s.phase="rest"; s.left=s.rest;
            setTimer({phase:"rest",round:s.round,total:s.total,left:s.rest});
            beep(440,0.3,0.5);
          } else {
            s.round++; s.phase="work"; s.left=s.work;
            setTimer({phase:"work",round:s.round,total:s.total,left:s.work});
            beep(880,0.4,0.8);
          }
        } else {
          setTimer(p=>({...p,left:s.left}));
        }
      },1000);
    }
  },[killTimer]);

  const bcast = useCallback(cmd=>{
    Object.values(conns.current).forEach(c=>{ try{c.send(cmd);}catch(_){} });
  },[]);

  /* ─── Join Room ─── */
  const joinRoom = async (asHost) => {
    if (!roomId.trim()) return;
    setErrMsg(""); setIsHost(asHost); setPage("room");
    setStatus("📷 A iniciar câmara...");
    try {
      const stream = await navigator.mediaDevices.getUserMedia({video:true,audio:true});
      localStream.current = stream;
      if (localRef.current) localRef.current.srcObject = stream;
      setStatus("🔌 A ligar à rede P2P...");
      await loadPeer();

      const slug   = slugify(roomId);
      const hostId = `pm-${slug}-host`;
      const myId   = asHost ? hostId : `pm-${slug}-${Date.now()}`;

      const peer = new window.Peer(myId, {
        config: { iceServers: [
          {urls:"stun:stun.l.google.com:19302"},
          {urls:"stun:stun1.l.google.com:19302"},
          {urls:"stun:stun.cloudflare.com:3478"},
        ]},
      });
      peerInst.current = peer;

      peer.on("open", () => {
        setStatus(asHost ? "✅ Sala aberta — a aguardar clientes..." : "✅ Ligado!");

        if (!asHost) {
          const conn = peer.connect(hostId, {reliable:true, metadata:{name:myName||"Participante"}});
          conn.on("open", ()=>{
            conns.current[hostId] = conn;
            conn.on("data", applyCmd);
            conn.on("close", ()=>delete conns.current[hostId]);
          });
          conn.on("error", ()=>setErrMsg("❌ Sala não encontrada. Verifica o nome da sala."));

          const call = peer.call(hostId, stream, {metadata:{name:myName||"Participante"}});
          calls.current[hostId] = call;
          call.on("stream", s=>{
            setRemotes(r=>({...r,[hostId]:{name:"Trainer",stream:s}}));
            setStatus("");
          });
          call.on("close", ()=>setRemotes(r=>{const n={...r};delete n[hostId];return n;}));
        }
      });

      /* Host: accept connections */
      peer.on("connection", conn=>{
        const name = conn.metadata?.name||"Participante";
        conns.current[conn.peer] = conn;
        conn.on("close", ()=>{
          delete conns.current[conn.peer];
          setRemotes(r=>{const n={...r};delete n[conn.peer];return n;});
        });
        setTimeout(()=>{
          if (!peerInst.current) return;
          const call = peerInst.current.call(conn.peer,stream,{metadata:{name:myName||"Trainer"}});
          call.on("stream",s=>{
            calls.current[conn.peer]=call;
            setRemotes(r=>({...r,[conn.peer]:{name,stream:s}}));
            setStatus("");
          });
          call.on("close",()=>{
            delete calls.current[conn.peer];
            setRemotes(r=>{const n={...r};delete n[conn.peer];return n;});
          });
        },700);
      });

      /* Accept video calls */
      peer.on("call", call=>{
        call.answer(stream);
        const name = call.metadata?.name||(asHost?"Participante":"Trainer");
        call.on("stream",s=>{
          calls.current[call.peer]=call;
          setRemotes(r=>({...r,[call.peer]:{name,stream:s}}));
          setStatus("");
        });
        call.on("close",()=>{
          delete calls.current[call.peer];
          setRemotes(r=>{const n={...r};delete n[call.peer];return n;});
        });
      });

      peer.on("error",err=>{
        const map = {
          "unavailable-id":  "❌ Sala já em uso. Escolhe outro nome.",
          "peer-unavailable":"❌ Sala não encontrada. Verifica o nome.",
        };
        setErrMsg(map[err.type]||`❌ ${err.message}`);
        setStatus("");
      });
    } catch(e) {
      setErrMsg(e.name==="NotAllowedError"
        ? "❌ Permissão de câmara/microfone negada pelo browser."
        : "❌ "+e.message);
      setStatus("");
      setPage("landing");
    }
  };

  /* ─── Leave ─── */
  const leaveRoom = () => {
    killTimer();
    localStream.current?.getTracks().forEach(t=>t.stop());
    peerInst.current?.destroy();
    peerInst.current=null; calls.current={}; conns.current={};
    setRemotes({}); setTimerOn(false);
    setTimer({phase:"idle",round:0,total:0,left:0});
    setPage("landing"); setStatus(""); setErrMsg("");
  };

  const toggleMic = ()=>{
    const t=localStream.current?.getAudioTracks()[0];
    if(t){t.enabled=!t.enabled;setMicOn(t.enabled);}
  };
  const toggleCam = ()=>{
    const t=localStream.current?.getVideoTracks()[0];
    if(t){t.enabled=!t.enabled;setCamOn(t.enabled);}
  };

  useEffect(()=>()=>{
    killTimer();
    localStream.current?.getTracks().forEach(t=>t.stop());
    peerInst.current?.destroy();
  },[killTimer]);

  /* ─── Derived ─── */
  const pi         = PHASE[timer.phase]||PHASE.idle;
  const remoteList = Object.entries(remotes);
  const total      = 1 + remoteList.length;
  const cols       = total===1?1:total===2?2:total<=4?2:3;
  const shareUrl   = `${location.origin}${location.pathname}?room=${encodeURIComponent(roomId)}`;

  /* ══════════════════════════
     LANDING PAGE
  ══════════════════════════ */
  if (page==="landing") return (
    <div style={{
      minHeight:"100vh",
      background:"radial-gradient(ellipse 90% 70% at 40% 30%,#091828 0%,#030508 100%)",
      display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
      fontFamily:"'Segoe UI',system-ui,-apple-system,sans-serif",
      color:"#fff",padding:24,
    }}>
      {/* Logo */}
      <div style={{textAlign:"center",marginBottom:48}}>
        <div style={{fontSize:58,filter:"drop-shadow(0 0 30px rgba(0,255,136,0.65))",lineHeight:1}}>⚡</div>
        <div style={{
          color:"#00ff88",fontWeight:900,fontSize:28,letterSpacing:10,marginTop:10,
          textShadow:"0 0 50px rgba(0,255,136,0.4)",
        }}>PERFEKTUS</div>
        <div style={{color:"#0d1e2a",fontSize:11,letterSpacing:7,marginTop:5}}>TRAINING ROOM</div>
        <div style={{color:"#0a1520",fontSize:11,marginTop:14,lineHeight:1.8,maxWidth:320}}>
          Videochamada P2P · Timer HIIT Sincronizado<br/>
          Sem subscrição · Sem limite de tempo · Cifrado E2E
        </div>
      </div>

      {/* Card */}
      <div style={{
        background:"rgba(255,255,255,0.022)",
        border:"1px solid rgba(255,255,255,0.07)",
        borderRadius:26,padding:"38px 40px",
        width:"100%",maxWidth:420,
        backdropFilter:"blur(20px)",
        boxShadow:"0 30px 100px rgba(0,0,0,0.8)",
      }}>
        <FLabel>NOME DA SALA</FLabel>
        <FInput
          value={roomId}
          onChange={v=>setRoomId(v.toLowerCase().replace(/\s+/g,"-"))}
          placeholder="ex: joao-treino-online"
        />
        <FLabel style={{marginTop:14}}>O TEU NOME</FLabel>
        <FInput value={myName} onChange={setMyName} placeholder="ex: João"/>

        {errMsg && <ErrBox>{errMsg}</ErrBox>}

        <GBtn onClick={()=>roomId.trim()&&joinRoom(true)} disabled={!roomId.trim()}>
          ⚡ ENTRAR COMO TRAINER
        </GBtn>
        <div style={{height:8}}/>
        <OBtn onClick={()=>roomId.trim()&&joinRoom(false)} disabled={!roomId.trim()}>
          ENTRAR COMO PARTICIPANTE
        </OBtn>

        {roomId.trim() && (
          <div style={{marginTop:28,paddingTop:22,borderTop:"1px solid rgba(255,255,255,0.045)"}}>
            <div style={{color:"#0d1a24",fontSize:9,letterSpacing:2.5,marginBottom:9}}>
              LINK PARA ENVIAR AOS CLIENTES
            </div>
            <div style={{
              background:"rgba(0,255,136,0.04)",border:"1px solid rgba(0,255,136,0.11)",
              borderRadius:10,padding:"9px 12px",display:"flex",alignItems:"center",gap:8,
            }}>
              <span style={{color:"#0a6a45",fontSize:11,flex:1,wordBreak:"break-all",lineHeight:1.5}}>
                {shareUrl}
              </span>
              <button
                onClick={()=>{
                  navigator.clipboard.writeText(shareUrl)
                    .then(()=>{/* ok */}).catch(()=>{});
                }}
                style={{
                  background:"rgba(0,255,136,0.15)",border:"none",color:"#00ff88",
                  borderRadius:6,padding:"5px 10px",cursor:"pointer",fontSize:14,flexShrink:0,
                }}
              >📋</button>
            </div>
          </div>
        )}
      </div>

      <div style={{color:"#06101a",fontSize:10,marginTop:32,textAlign:"center",lineHeight:1.9}}>
        WebRTC peer-to-peer · Sem servidor central · Funciona em iOS, Android, Mac, PC<br/>
        Hospedar grátis em <b style={{color:"#0a1a28"}}>Netlify</b> · <b style={{color:"#0a1a28"}}>GitHub Pages</b> · <b style={{color:"#0a1a28"}}>Vercel</b>
      </div>
    </div>
  );

  /* ══════════════════════════
     ROOM PAGE
  ══════════════════════════ */
  return (
    <div style={{
      position:"fixed",inset:0,background:"#03050a",
      fontFamily:"'Segoe UI',system-ui,sans-serif",
      display:"flex",flexDirection:"column",overflow:"hidden",
    }}>
      {/* ── TOP BAR ── */}
      <div style={{
        display:"flex",alignItems:"center",gap:10,padding:"7px 16px",
        background:"rgba(2,4,9,0.98)",backdropFilter:"blur(18px)",
        borderBottom:"1px solid rgba(0,255,136,0.07)",flexShrink:0,zIndex:20,
      }}>
        <span style={{color:"#00ff88",fontWeight:900,fontSize:17,filter:"drop-shadow(0 0 8px rgba(0,255,136,0.6))"}}>⚡</span>
        <span style={{color:"#00cc66",fontWeight:800,fontSize:11,letterSpacing:4}}>PERFEKTUS</span>
        <span style={{color:"#0c1a26",fontSize:11,margin:"0 2px"}}>|</span>
        <span style={{color:"#172535",fontSize:11}}>
          Sala: <b style={{color:"#1e3347"}}>{roomId}</b>
        </span>
        {isHost && (
          <span style={{
            background:"rgba(0,255,136,0.1)",color:"#009955",
            fontSize:9,padding:"2px 8px",borderRadius:4,letterSpacing:2,fontWeight:700,
          }}>TRAINER</span>
        )}
        {status && <span style={{color:"#0c1e2e",fontSize:11,marginLeft:4}}>· {status}</span>}

        <div style={{marginLeft:"auto",display:"flex",gap:7,alignItems:"center"}}>
          {/* Participant count */}
          {remoteList.length>0 && (
            <span style={{
              background:"rgba(0,255,136,0.07)",border:"1px solid rgba(0,255,136,0.1)",
              color:"#007744",fontSize:10,padding:"3px 10px",borderRadius:6,letterSpacing:1,
            }}>
              👥 {remoteList.length}
            </span>
          )}
          <TBtn onClick={()=>navigator.clipboard.writeText(shareUrl).catch(()=>{})}>
            📋 Link
          </TBtn>
          {isHost && (
            <TBtn active={panelOpen} onClick={()=>setPanelOpen(p=>!p)}>
              ⏱ HIIT Timer
            </TBtn>
          )}
        </div>
      </div>

      {/* ── VIDEO GRID ── */}
      <div style={{
        flex:1,display:"grid",
        gridTemplateColumns:`repeat(${cols},1fr)`,
        gap:3,padding:3,
        background:"#02040a",position:"relative",overflow:"hidden",
      }}>
        {/* Local */}
        <VTile label={myName||(isHost?"Tu (Trainer)":"Tu (Participante)")}>
          <video ref={localRef} autoPlay muted playsInline style={{
            width:"100%",height:"100%",objectFit:"cover",
            transform:"scaleX(-1)",opacity:camOn?1:0.12,
          }}/>
          {!camOn && <NoCam/>}
        </VTile>

        {/* Remotes */}
        {remoteList.map(([id,{name}])=>(
          <VTile key={id} label={name}>
            <video
              ref={el=>{
                if(el){
                  remoteRefs.current[id]=el;
                  if(remotes[id]?.stream && el.srcObject!==remotes[id].stream)
                    el.srcObject=remotes[id].stream;
                }
              }}
              autoPlay playsInline
              style={{width:"100%",height:"100%",objectFit:"cover"}}
            />
          </VTile>
        ))}

        {/* Waiting placeholder */}
        {remoteList.length===0 && (
          <div style={{
            background:"rgba(0,0,0,0.2)",borderRadius:10,
            display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,
          }}>
            {status ? (
              <>
                <div style={{width:32,height:32,border:"3px solid rgba(0,255,136,0.2)",borderTopColor:"#00ff88",borderRadius:"50%",animation:"spin 0.9s linear infinite"}}/>
                <div style={{color:"#0e1c2e",fontSize:14}}>{status}</div>
              </>
            ) : (
              <>
                <div style={{fontSize:44,opacity:0.3}}>👥</div>
                <div style={{color:"#0e1c2e",fontSize:14,textAlign:"center",padding:"0 24px",lineHeight:1.7}}>
                  {isHost ? "À espera de participantes…\nPartilha o link acima." : "A ligar ao trainer…"}
                </div>
              </>
            )}
            {errMsg && <div style={{color:"#cc2244",fontSize:12,textAlign:"center",padding:"0 24px"}}>{errMsg}</div>}
          </div>
        )}

        {/* ── TIMER OVERLAY ── */}
        {timerOn && (
          <div style={{
            position:"absolute",inset:0,zIndex:50,
            display:"flex",alignItems:"center",justifyContent:"center",
            pointerEvents:"none",
          }}>
            <div style={{
              background:pi.bg,
              backdropFilter:"blur(36px) saturate(200%)",
              WebkitBackdropFilter:"blur(36px) saturate(200%)",
              border:`3px solid ${pi.color}`,
              borderRadius:34,padding:"38px 72px",
              textAlign:"center",minWidth:290,
              boxShadow:`0 0 90px ${pi.color}33, 0 60px 120px rgba(0,0,0,0.97)`,
              pointerEvents:"auto",
              animation:timer.phase!=="done"?"glowPulse 2.4s ease-in-out infinite":"none",
            }}>
              {/* Phase label */}
              <div style={{color:pi.color,fontSize:11,fontWeight:800,letterSpacing:5,marginBottom:8}}>
                {pi.label}
              </div>

              {/* Big number */}
              <div style={{
                color:"#fff",
                fontSize:timer.phase==="done"?74:104,
                fontWeight:900,lineHeight:1,
                fontVariantNumeric:"tabular-nums",
                letterSpacing:-4,
                textShadow:`0 0 70px ${pi.color}80, 0 4px 16px rgba(0,0,0,0.95)`,
              }}>
                {timer.phase==="done" ? "🏆" : fmt(timer.left)}
              </div>

              {/* Round info */}
              {(timer.phase==="work"||timer.phase==="rest") && (
                <div style={{color:"#1a2a3a",fontSize:13,marginTop:12,letterSpacing:1}}>
                  ROUND&nbsp;<b style={{color:pi.color,fontSize:16}}>{timer.round}</b>&nbsp;/&nbsp;{timer.total}
                </div>
              )}

              {timer.phase==="done" && (
                <div style={{color:"#ffd700",fontSize:20,fontWeight:800,marginTop:12,letterSpacing:1}}>
                  SESSÃO COMPLETA!
                </div>
              )}

              {/* Progress dots (max 20) */}
              {timer.total>0 && timer.total<=20 && timer.phase!=="done" && (
                <div style={{
                  display:"flex",flexWrap:"wrap",justifyContent:"center",
                  gap:5,marginTop:18,maxWidth:250,margin:"18px auto 0",
                }}>
                  {Array.from({length:timer.total},(_,i)=>(
                    <div key={i} style={{
                      width:i===timer.round-1?11:7,
                      height:i===timer.round-1?11:7,
                      borderRadius:"50%",
                      background:i<timer.round-1?"#1a3a28"
                        :i===timer.round-1?pi.color
                        :"rgba(255,255,255,0.07)",
                      transition:"all 0.35s ease",
                      marginTop:i===timer.round-1?-2:0,
                    }}/>
                  ))}
                </div>
              )}

              {/* Close when done */}
              {timer.phase==="done" && (
                <button
                  onClick={()=>{setTimerOn(false);setTimer({phase:"idle",round:0,total:0,left:0});}}
                  style={{
                    marginTop:22,background:"rgba(255,215,0,0.12)",
                    border:"1px solid rgba(255,215,0,0.28)",
                    color:"#ffd700",borderRadius:10,padding:"7px 24px",
                    cursor:"pointer",fontSize:12,fontWeight:700,
                  }}
                >Fechar ✕</button>
              )}
            </div>
          </div>
        )}
      </div>

      {/* ── BOTTOM CONTROLS ── */}
      <div style={{
        display:"flex",alignItems:"center",justifyContent:"center",gap:10,
        padding:"10px 20px",
        background:"rgba(2,4,9,0.98)",backdropFilter:"blur(18px)",
        borderTop:"1px solid rgba(255,255,255,0.03)",
        flexShrink:0,zIndex:20,
      }}>
        <CBtn active={micOn} onClick={toggleMic}>
          <span>{micOn?"🎙️":"🔇"}</span>
          <span style={{fontSize:9}}>{micOn?"Mic":"Mudo"}</span>
        </CBtn>
        <CBtn active={camOn} onClick={toggleCam}>
          <span>{camOn?"📷":"🚫"}</span>
          <span style={{fontSize:9}}>Câmara</span>
        </CBtn>
        <button onClick={leaveRoom} style={{
          background:"rgba(255,30,60,0.14)",color:"#ff3d5a",
          border:"1px solid rgba(255,30,60,0.25)",
          padding:"10px 28px",borderRadius:50,cursor:"pointer",
          fontWeight:700,fontSize:13,letterSpacing:0.5,
        }}>📵 Sair</button>
      </div>

      {/* ── HOST TIMER PANEL ── */}
      {isHost && panelOpen && (
        <div style={{
          position:"fixed",bottom:76,right:18,zIndex:300,
          background:"rgba(2,5,13,0.99)",backdropFilter:"blur(30px)",
          WebkitBackdropFilter:"blur(30px)",
          border:"1px solid rgba(0,255,136,0.18)",
          borderRadius:22,padding:"24px 26px",width:320,
          boxShadow:"0 24px 80px rgba(0,0,0,0.95),0 0 0 1px rgba(0,255,136,0.04)",
        }}>
          {/* Header */}
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:22}}>
            <span style={{color:"#00ff88",fontWeight:900,fontSize:13,letterSpacing:3}}>
              ⚡ HIIT TIMER
            </span>
            <button onClick={()=>setPanelOpen(false)}
              style={{background:"none",border:"none",color:"#1a2a38",cursor:"pointer",fontSize:19,lineHeight:1}}>
              ✕
            </button>
          </div>

          {/* Config rows */}
          {[
            {k:"work",   label:"TRABALHO (s)", step:5,  min:5,  max:300},
            {k:"rest",   label:"DESCANSO (s)", step:5,  min:5,  max:300},
            {k:"rounds", label:"ROUNDS",       step:1,  min:1,  max:40 },
          ].map(({k,label,step,min,max})=>(
            <div key={k} style={{marginBottom:18}}>
              <div style={{color:"#1a2838",fontSize:10,letterSpacing:2,marginBottom:7}}>{label}</div>
              <div style={{display:"flex",alignItems:"center",gap:7}}>
                <NBtn onClick={()=>setCfg(p=>({...p,[k]:Math.max(min,p[k]-step)})}>−</NBtn>
                <div style={{
                  flex:1,textAlign:"center",color:"#fff",
                  fontSize:34,fontWeight:900,fontVariantNumeric:"tabular-nums",letterSpacing:-1,
                }}>
                  {cfg[k]}
                </div>
                <NBtn onClick={()=>setCfg(p=>({...p,[k]:Math.min(max,p[k]+step)})}>+</NBtn>
              </div>
            </div>
          ))}

          {/* Presets */}
          <div style={{marginBottom:20}}>
            <div style={{color:"#0e1c28",fontSize:10,letterSpacing:2,marginBottom:10}}>PRESETS</div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {PRESETS.map(p=>(
                <button key={p.n}
                  onClick={()=>setCfg({work:p.w,rest:p.r,rounds:p.rds})}
                  style={{
                    background:"rgba(0,255,136,0.06)",border:"1px solid rgba(0,255,136,0.15)",
                    color:"#009955",padding:"4px 11px",borderRadius:7,
                    cursor:"pointer",fontSize:11,fontWeight:600,
                  }}
                >{p.n}</button>
              ))}
            </div>
          </div>

          {/* Action buttons */}
          <div style={{display:"flex",gap:7,marginBottom:14}}>
            <button
              onClick={()=>{
                const cmd={action:"start",work:cfg.work,rest:cfg.rest,rounds:cfg.rounds};
                bcast(cmd); applyCmd(cmd);
              }}
              style={{
                flex:1,background:"#00ff88",color:"#000",border:"none",
                padding:"13px 0",borderRadius:13,fontWeight:900,
                cursor:"pointer",fontSize:14,letterSpacing:1,
              }}
            >▶ INICIAR</button>
            <button
              onClick={()=>{const c={action:"stop"};bcast(c);applyCmd(c);}}
              style={{
                background:"rgba(255,61,90,0.12)",color:"#ff3d5a",
                border:"1px solid rgba(255,61,90,0.2)",
                padding:"13px 15px",borderRadius:13,cursor:"pointer",fontSize:18,
              }}
            >⏸</button>
            <button
              onClick={()=>{const c={action:"reset"};bcast(c);applyCmd(c);}}
              style={{
                background:"rgba(255,255,255,0.03)",color:"#1a2838",
                border:"1px solid rgba(255,255,255,0.05)",
                padding:"13px 15px",borderRadius:13,cursor:"pointer",fontSize:16,
              }}
            >↺</button>
          </div>

          {/* Participants count */}
          <div style={{
            color:"#0e1c28",fontSize:11,textAlign:"center",
            padding:"8px 0",borderTop:"1px solid rgba(255,255,255,0.04)",
          }}>
            {remoteList.length===0
              ? "— Aguarda a ligação dos clientes —"
              : `${remoteList.length} cliente${remoteList.length>1?"s":""} ligado${remoteList.length>1?"s":""}`}
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   SUB-COMPONENTS
══════════════════════════════════════════ */
function VTile({label,children}) {
  return (
    <div style={{position:"relative",background:"#080b18",borderRadius:10,overflow:"hidden",minHeight:80}}>
      {children}
      <div style={{
        position:"absolute",bottom:7,left:7,
        background:"rgba(0,0,0,0.7)",backdropFilter:"blur(6px)",
        color:"#6a7a8a",fontSize:11,padding:"3px 9px",borderRadius:6,
      }}>{label}</div>
    </div>
  );
}
function NoCam() {
  return (
    <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{fontSize:38,opacity:0.18}}>📷</div>
    </div>
  );
}
function TBtn({children,onClick,active}) {
  return (
    <button onClick={onClick} style={{
      background:active?"#00ff88":"rgba(255,255,255,0.04)",
      border:`1px solid ${active?"#00ff88":"rgba(255,255,255,0.07)"}`,
      color:active?"#000":"#2a3a4a",
      padding:"4px 14px",borderRadius:8,cursor:"pointer",fontSize:11,fontWeight:700,
    }}>{children}</button>
  );
}
function CBtn({children,onClick,active}) {
  return (
    <button onClick={onClick} style={{
      background:active?"rgba(255,255,255,0.05)":"rgba(255,40,70,0.12)",
      border:`1px solid ${active?"rgba(255,255,255,0.08)":"rgba(255,40,70,0.22)"}`,
      color:active?"#8a9aaa":"#ff3d5a",
      padding:"8px 16px",borderRadius:50,cursor:"pointer",
      display:"flex",flexDirection:"column",alignItems:"center",gap:2,fontSize:14,
    }}>{children}</button>
  );
}
function NBtn({children,onClick}) {
  return (
    <button onClick={onClick} style={{
      width:38,height:38,background:"rgba(255,255,255,0.04)",
      border:"1px solid rgba(255,255,255,0.07)",
      color:"#3a4a5a",borderRadius:9,cursor:"pointer",fontSize:22,
      display:"flex",alignItems:"center",justifyContent:"center",
    }}>{children}</button>
  );
}
function FLabel({children,style={}}) {
  return (
    <div style={{color:"#0e1c28",fontSize:10,letterSpacing:2.5,marginBottom:7,...style}}>
      {children}
    </div>
  );
}
function FInput({value,onChange,placeholder}) {
  return (
    <input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder}
      style={{
        width:"100%",background:"rgba(255,255,255,0.04)",
        border:"1px solid rgba(255,255,255,0.07)",
        borderRadius:12,padding:"12px 16px",color:"#fff",fontSize:15,
        outline:"none",marginBottom:4,display:"block",
      }}
    />
  );
}
function ErrBox({children}) {
  return (
    <div style={{
      background:"rgba(255,40,70,0.09)",border:"1px solid rgba(255,40,70,0.18)",
      borderRadius:10,padding:"10px 14px",margin:"14px 0",color:"#ff8090",fontSize:13,
    }}>{children}</div>
  );
}
function GBtn({children,onClick,disabled}) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%",padding:14,marginTop:16,
      background:disabled?"rgba(0,40,20,0.16)":"#00ff88",
      color:disabled?"#0a2015":"#000",
      border:`1px solid ${disabled?"rgba(0,80,40,0.1)":"transparent"}`,
      borderRadius:14,fontWeight:900,fontSize:14,
      cursor:disabled?"not-allowed":"pointer",letterSpacing:1,
    }}>{children}</button>
  );
}
function OBtn({children,onClick,disabled}) {
  return (
    <button onClick={onClick} disabled={disabled} style={{
      width:"100%",padding:13,
      background:"transparent",
      color:disabled?"#0a1810":"#00ff88",
      border:`1px solid ${disabled?"rgba(0,70,35,0.1)":"rgba(0,255,136,0.28)"}`,
      borderRadius:14,fontWeight:600,fontSize:13,
      cursor:disabled?"not-allowed":"pointer",
    }}>{children}</button>
  );
}

/* ══════════════════════════════════════════
   MOUNT
══════════════════════════════════════════ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>
</body>
</html>
