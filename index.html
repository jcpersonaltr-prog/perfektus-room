/* ══════════════════════════════════
   AUDIO
══════════════════════════════════ */
function beep(hz,dur,vol){
  hz=hz||880;dur=dur||0.18;vol=vol||0.5;
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=hz;o.type='sine';
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start();o.stop(ac.currentTime+dur+0.05);
    setTimeout(function(){ac.close();},(dur+0.2)*1000);
  }catch(e){}
}
function fanfare(){
  beep(880,.1,.7);
  setTimeout(function(){beep(1100,.1,.6);},180);
  setTimeout(function(){beep(1320,.85,.8);},360);
}

/* ══════════════════════════════════
   HELPERS
══════════════════════════════════ */
function fmt(s){
  if(s>=60) return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;
  return s<10?'0'+s:''+s;
}
function slugify(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'-').replace(/-+/g,'-');}
function el(tag,css,attrs){
  var e=document.createElement(tag);
  if(css) e.style.cssText=css;
  if(attrs) Object.keys(attrs).forEach(function(k){if(k!=='style')e[k]=attrs[k];});
  return e;
}
function div(css){return el('div',css);}
function btn(text,css,onclick){
  var b=el('button',css);
  b.innerHTML=text;
  if(onclick) b.onclick=onclick;
  return b;
}
function inp(placeholder,css){
  var i=el('input','',{type:'text',placeholder:placeholder});
  i.style.cssText=css||'';
  return i;
}

   STATE
══════════════════════════════════ */

  page:'landing',

/* ══════════════════════════════════
   PEERJS LOADER
══════════════════════════════════ */
function loadPeer(cb){
  if(window.Peer){cb();return;}
  var s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
  s.onload=cb;
  document.head.appendChild(s);
}

/* ══════════════════════════════════
   TIMER ENGINE
══════════════════════════════════ */
function killTimer(){clearInterval(S.timerIv);}

function applyCmd(cmd){
  if(cmd.action==='stop'){
    killTimer();S.timerOn=false;
    S.timer={phase:'idle',round:S.timer.round,total:S.timer.total,left:0};
    renderRoom();return;
  }
  if(cmd.action==='reset'){
    killTimer();S.timerOn=false;
    S.timer={phase:'idle',round:0,total:0,left:0};
    renderRoom();return;
  }
  if(cmd.action==='start'){
    killTimer();
    var w=cmd.work,r=cmd.rest,rds=cmd.rounds;
    S.ts={phase:'work',round:1,work:w,rest:r,total:rds,left:w};
    S.timerOn=true;
    S.timer={phase:'work',round:1,total:rds,left:w};
    renderRoom();
    beep(880,.4,.8);
    S.timerIv=setInterval(function(){
      var ts=S.ts;
      ts.left-=1;
      if(ts.left>0&&ts.left<=3) beep(660,.06,.28);
      if(ts.left<=0){
        if(ts.phase==='work'){
          if(ts.round>=ts.total){
            clearInterval(S.timerIv);
            ts.phase='done';
            S.timer={phase:'done',round:ts.round,total:ts.total,left:0};
            S.timerOn=true;
            renderRoom();fanfare();return;
          }
          ts.phase='rest';ts.left=ts.rest;
          S.timer={phase:'rest',round:ts.round,total:ts.total,left:ts.rest};
          beep(440,.3,.5);
        } else {
          ts.round++;ts.phase='work';ts.left=ts.work;
          S.timer={phase:'work',round:ts.round,total:ts.total,left:ts.work};
          beep(880,.4,.8);
        }
      } else {
        S.timer.left=ts.left;
      }
      updateTimerDisplay();
    },1000);
  }
}

function bcast(cmd){
  Object.values(S.conns).forEach(function(c){try{c.send(cmd);}catch(e){}});
}

/* ══════════════════════════════════
   JOIN ROOM
══════════════════════════════════ */
function joinRoom(asHost){
  if(!S.roomId.trim()) return;
  S.errMsg='';S.isHost=asHost;S.page='room';S.status='📷 A iniciar câmara...';
  render();
  navigator.mediaDevices.getUserMedia({video:true,audio:true})
  .then(function(stream){
    S.localStream=stream;
    var lv=document.getElementById('local-video');
    if(lv) lv.srcObject=stream;
    S.status='🔌 A ligar à rede P2P...';
    setStatus(S.status);
    loadPeer(function(){
      var slug=slugify(S.roomId);
      var hostId='pm-'+slug+'-host';
      var myId=asHost?hostId:'pm-'+slug+'-'+Date.now();
      var peer=new window.Peer(myId,{
        config:{iceServers:[
          {urls:'stun:stun.l.google.com:19302'},
          {urls:'stun:stun1.l.google.com:19302'},
          {urls:'stun:stun.cloudflare.com:3478'},
        ]}
      });
      S.peer=peer;

      peer.on('open',function(){
        S.status=asHost?'✅ Sala aberta — a aguardar clientes...':'✅ Ligado!';
        setStatus(S.status);

        if(!asHost){
          var conn=peer.connect(hostId,{reliable:true,metadata:{name:S.myName||'Participante'}});
          conn.on('open',function(){
            S.conns[hostId]=conn;
            conn.on('data',applyCmd);
            conn.on('close',function(){delete S.conns[hostId];});
          });
          conn.on('error',function(){
            S.errMsg='❌ Sala não encontrada. Verifica o nome.';
            setErr(S.errMsg);
          });
          var call=peer.call(hostId,stream,{metadata:{name:S.myName||'Participante'}});
          S.calls[hostId]=call;
          call.on('stream',function(rs){
            addRemote(hostId,'Trainer',rs);
            S.status='';setStatus('');
          });
          call.on('close',function(){removeRemote(hostId);});
        }
      });

      peer.on('connection',function(conn){
        var name=conn.metadata&&conn.metadata.name?conn.metadata.name:'Participante';
        S.conns[conn.peer]=conn;
        conn.on('close',function(){delete S.conns[conn.peer];removeRemote(conn.peer);});
        setTimeout(function(){
          if(!S.peer) return;
          var call=S.peer.call(conn.peer,stream,{metadata:{name:S.myName||'Trainer'}});
          call.on('stream',function(rs){
            S.calls[conn.peer]=call;
            addRemote(conn.peer,name,rs);
            S.status='';setStatus('');
          });
          call.on('close',function(){delete S.calls[conn.peer];removeRemote(conn.peer);});
        },700);
      });

      peer.on('call',function(call){
        call.answer(stream);
        var name=call.metadata&&call.metadata.name?call.metadata.name:(asHost?'Participante':'Trainer');
        call.on('stream',function(rs){
          S.calls[call.peer]=call;
          addRemote(call.peer,name,rs);
          S.status='';setStatus('');
        });
        call.on('close',function(){delete S.calls[call.peer];removeRemote(call.peer);});
      });

      peer.on('error',function(err){
        var msgs={'unavailable-id':'❌ Sala já em uso. Tenta outro nome.',
                  'peer-unavailable':'❌ Sala não encontrada.'};
        S.errMsg=msgs[err.type]||'❌ '+err.message;
        S.status='';
        setErr(S.errMsg);setStatus('');
      });
    });
  })
  .catch(function(e){
    S.errMsg=e.name==='NotAllowedError'?'❌ Câmara/microfone bloqueado pelo browser.':'❌ '+e.message;
    S.page='landing';
    render();
  });
}

function addRemote(id,name,stream){
  var vEl=document.createElement('video');
  vEl.autoplay=true;vEl.playsInline=true;
  vEl.style.cssText='width:100%;height:100%;object-fit:cover;';
  vEl.srcObject=stream;
  S.remotes[id]={name:name,stream:stream,videoEl:vEl};
  rebuildGrid();
}
function removeRemote(id){
  delete S.remotes[id];
  rebuildGrid();
}

function leaveRoom(){
  killTimer();
  if(S.localStream) S.localStream.getTracks().forEach(function(t){t.stop();});
  if(S.peer) S.peer.destroy();
  S.peer=null;S.calls={};S.conns={};S.localStream=null;
  S.remotes={};S.timerOn=false;S.panelOpen=false;
  S.timer={phase:'idle',round:0,total:0,left:0};
  S.page='landing';S.status='';S.errMsg='';
  render();
}

  overlay.style.display=S.timerOn?'flex':'none';
  var pi=PHASE[S.timer.phase]||PHASE.idle;
  var box=div('backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:3px solid '+pi.color+';border-radius:34px;padding:38px 72px;text-align:center;min-width:290px;box-shadow:0 0 90px '+pi.color+'33,0 60px 120px rgba(0,0,0,.97);pointer-events:auto;animation:glow 2.4s ease-in-out infinite;background:'+pi.bg+';');
  box.id='timer-box';
  box.style.setProperty('--gc',pi.color+'44');
  renderTimerContent(box,pi);
  overlay.appendChild(box);
  grid.appendChild(overlay);

  updateGridCols();

  // TIMER PANEL
  var panel=div('position:fixed;bottom:76px;right:18px;z-index:300;background:rgba(2,5,13,0.99);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(0,255,136,0.18);border-radius:22px;padding:24px 26px;width:320px;box-shadow:0 24px 80px rgba(0,0,0,.95);');
  panel.id='timer-panel';
  panel.style.display='none';
  buildPanel(panel);
  app.appendChild(panel);
  if(S.panelOpen) panel.style.display='block';

  // BOTTOM BAR
  var bottom=div('display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 20px;background:rgba(2,4,9,0.98);border-top:1px solid rgba(255,255,255,0.03);flex-shrink:0;z-index:20;');
  var micBtn=btn(S.micOn?'🎙️':'🔇','background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#8a9aaa;padding:8px 16px;border-radius:50px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:14px;');
  var micLbl=el('span','font-size:9px;color:#8a9aaa;');micLbl.textContent=S.micOn?'Mic':'Mudo';
  micBtn.appendChild(micLbl);
  micBtn.onclick=function(){
    var t=S.localStream&&S.localStream.getAudioTracks()[0];
    if(t){t.enabled=!t.enabled;S.micOn=t.enabled;
      micBtn.childNodes[0].nodeValue=S.micOn?'🎙️':'🔇';
      micLbl.textContent=S.micOn?'Mic':'Mudo';
    }
  };
  var camBtn=btn(S.camOn?'📷':'🚫','background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#8a9aaa;padding:8px 16px;border-radius:50px;display:flex;flex-direction:column;align-items:center;gap:2px;font-size:14px;');
  var camLbl=el('span','font-size:9px;color:#8a9aaa;');camLbl.textContent='Câmara';
  camBtn.appendChild(camLbl);
  camBtn.onclick=function(){
    var t=S.localStream&&S.localStream.getVideoTracks()[0];
    if(t){t.enabled=!t.enabled;S.camOn=t.enabled;
      camBtn.childNodes[0].nodeValue=S.camOn?'📷':'🚫';
      var lv=document.getElementById('local-video');
      if(lv) lv.style.opacity=S.camOn?1:0.12;
    }
  };
  var leaveBtn=btn('📵 Sair','background:rgba(255,30,60,0.14);color:#ff3d5a;border:1px solid rgba(255,30,60,0.25);padding:10px 28px;border-radius:50px;font-weight:700;font-size:13px;');
  leaveBtn.onclick=leaveRoom;
  bottom.appendChild(micBtn);bottom.appendChild(camBtn);bottom.appendChild(leaveBtn);
  app.appendChild(bottom);
}

function renderTimerContent(box,pi){
  box.innerHTML='';
  var phLabel=div('color:'+pi.color+';font-size:11px;font-weight:800;letter-spacing:5px;margin-bottom:8px');
  phLabel.textContent=pi.label;box.appendChild(phLabel);

  var bigNum=div('color:#fff;font-size:'+(S.timer.phase==='done'?74:104)+'px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-4px;text-shadow:0 0 70px '+pi.color+'80,0 4px 16px rgba(0,0,0,.95);');
  bigNum.id='timer-big';
  bigNum.textContent=S.timer.phase==='done'?'🏆':fmt(S.timer.left);
  box.appendChild(bigNum);

  if(S.timer.phase==='work'||S.timer.phase==='rest'){
    var rndInfo=div('color:#1a2a3a;font-size:13px;margin-top:12px;letter-spacing:1px');
    rndInfo.innerHTML='ROUND <b style="color:'+pi.color+';font-size:16px">'+S.timer.round+'</b> / '+S.timer.total;
    box.appendChild(rndInfo);
  }
  if(S.timer.phase==='done'){
    var doneLabel=div('color:#ffd700;font-size:20px;font-weight:800;margin-top:12px;letter-spacing:1px');
    doneLabel.textContent='SESSÃO COMPLETA!';box.appendChild(doneLabel);
    var closeBtn=btn('Fechar ✕','margin-top:22px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.28);color:#ffd700;border-radius:10px;padding:7px 24px;font-size:12px;font-weight:700;');
    closeBtn.onclick=function(){S.timerOn=false;S.timer={phase:'idle',round:0,total:0,left:0};renderRoom();};
    box.appendChild(closeBtn);
  }

  // Progress dots
  if(S.timer.total>0&&S.timer.total<=20&&S.timer.phase!=='done'){
    var dots=div('display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:18px;max-width:250px;margin-left:auto;margin-right:auto;');
    for(var i=0;i<S.timer.total;i++){
      var dot=div('border-radius:50%;transition:all .35s ease;flex-shrink:0;');
      var isCur=i===S.timer.round-1,isDone=i<S.timer.round-1;
      dot.style.width=(isCur?11:7)+'px';dot.style.height=(isCur?11:7)+'px';
      dot.style.background=isDone?'#1a3a28':isCur?pi.color:'rgba(255,255,255,0.07)';
      dots.appendChild(dot);
    }
    box.appendChild(dots);
  }
}

function updateTimerDisplay(){
  var pi=PHASE[S.timer.phase]||PHASE.idle;
  var bigEl=document.getElementById('timer-big');
  if(bigEl) bigEl.textContent=S.timer.phase==='done'?'🏆':fmt(S.timer.left);
  var box=document.getElementById('timer-box');
  if(box&&(S.timer.phase==='idle'||S.timer.phase==='done')){
    renderTimerContent(box,pi);
    box.style.borderColor=pi.color;
    box.style.background=pi.bg;
    box.style.setProperty('--gc',pi.color+'44');
  }
  // Update round dots when round changes - re-render content
  var overlay=document.getElementById('timer-overlay');
  if(overlay) overlay.style.display=S.timerOn?'flex':'none';
}

function buildPanel(panel){
  panel.innerHTML='';
  // Header
  var hdr=div('display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;');
  var title=el('span','color:#00ff88;font-weight:900;font-size:13px;letter-spacing:3px;');
  title.textContent='⚡ HIIT TIMER';
  var closeX=btn('✕','background:none;border:none;color:#1a2a38;font-size:19px;line-height:1;');
  closeX.onclick=function(){S.panelOpen=false;var p=document.getElementById('timer-panel');if(p)p.style.display='none';toggleTimerBtn();};
  hdr.appendChild(title);hdr.appendChild(closeX);
  panel.appendChild(hdr);

  // Config rows
  [{k:'work',label:'TRABALHO (s)',step:5,min:5,max:300},
   {k:'rest',label:'DESCANSO (s)',step:5,min:5,max:300},
   {k:'rounds',label:'ROUNDS',step:1,min:1,max:40}
  ].forEach(function(row){
    var wrap=div('margin-bottom:18px;');
    var lbl=div('color:#1a2838;font-size:10px;letter-spacing:2px;margin-bottom:7px');
    lbl.textContent=row.label;wrap.appendChild(lbl);
    var row2=div('display:flex;align-items:center;gap:7px;');
    var minus=btn('−','width:38px;height:38px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#3a4a5a;border-radius:9px;font-size:22px;display:flex;align-items:center;justify-content:center;');
    var valEl=div('flex:1;text-align:center;color:#fff;font-size:34px;font-weight:900;font-variant-numeric:tabular-nums;letter-spacing:-1px;');
    valEl.id='cfg-'+row.k;valEl.textContent=S.cfg[row.k];
    var plus=btn('+','width:38px;height:38px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#3a4a5a;border-radius:9px;font-size:22px;display:flex;align-items:center;justify-content:center;');
    (function(k,step,min,max,ve){
      minus.onclick=function(){S.cfg[k]=Math.max(min,S.cfg[k]-step);ve.textContent=S.cfg[k];};
      plus.onclick=function(){S.cfg[k]=Math.min(max,S.cfg[k]+step);ve.textContent=S.cfg[k];};
    })(row.k,row.step,row.min,row.max,valEl);
    row2.appendChild(minus);row2.appendChild(valEl);row2.appendChild(plus);
    wrap.appendChild(row2);panel.appendChild(wrap);
  });

  // Presets
  var preWrap=div('margin-bottom:20px;');
  var preLbl=div('color:#0e1c28;font-size:10px;letter-spacing:2px;margin-bottom:10px');
  preLbl.textContent='PRESETS';preWrap.appendChild(preLbl);
  var preGrid=div('display:flex;flex-wrap:wrap;gap:6px;');
  PRESETS.forEach(function(p){
    var pb=btn(p.n,'background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.15);color:#009955;padding:4px 11px;border-radius:7px;font-size:11px;font-weight:600;');
    pb.onclick=function(){
      S.cfg={work:p.w,rest:p.r,rounds:p.rds};
      ['work','rest','rounds'].forEach(function(k){var e=document.getElementById('cfg-'+k);if(e)e.textContent=S.cfg[k];});
    };
    preGrid.appendChild(pb);
  });
  preWrap.appendChild(preGrid);panel.appendChild(preWrap);

  // Action buttons
  var actions=div('display:flex;gap:7px;margin-bottom:14px;');
  var startBtn=btn('▶ INICIAR','flex:1;background:#00ff88;color:#000;border:none;padding:13px 0;border-radius:13px;font-weight:900;font-size:14px;letter-spacing:1px;');
  startBtn.onclick=function(){
    var cmd={action:'start',work:S.cfg.work,rest:S.cfg.rest,rounds:S.cfg.rounds};
    bcast(cmd);applyCmd(cmd);
    // Re-render timer overlay
    var overlay=document.getElementById('timer-overlay');
    var box=document.getElementById('timer-box');
    if(overlay){overlay.style.display='flex';}
    if(box){var pi2=PHASE.work;box.style.borderColor=pi2.color;box.style.background=pi2.bg;renderTimerContent(box,pi2);}
  };
  var pauseBtn=btn('⏸','background:rgba(255,61,90,0.12);color:#ff3d5a;border:1px solid rgba(255,61,90,0.2);padding:13px 15px;border-radius:13px;font-size:18px;');
  pauseBtn.onclick=function(){var c={action:'stop'};bcast(c);applyCmd(c);};
  var resetBtn=btn('↺','background:rgba(255,255,255,0.03);color:#1a2838;border:1px solid rgba(255,255,255,0.05);padding:13px 15px;border-radius:13px;font-size:16px;');
  resetBtn.onclick=function(){var c={action:'reset'};bcast(c);applyCmd(c);};
  actions.appendChild(startBtn);actions.appendChild(pauseBtn);actions.appendChild(resetBtn);
  panel.appendChild(actions);

  // Participant count
  var pcDiv=div('color:#0e1c28;font-size:11px;text-align:center;padding:8px 0;border-top:1px solid rgba(255,255,255,0.04);');
  pcDiv.id='panel-pcount';
  var n=Object.keys(S.remotes).length;
  pcDiv.textContent=n===0?'— Aguarda a ligação dos clientes —':n+' cliente'+(n>1?'s':'')+' ligado'+(n>1?'s':'');
  panel.appendChild(pcDiv);
}

function rebuildGrid(){
  // Rebuild only the grid children, preserving the container
  var grid=document.getElementById('video-grid');
  if(!grid){renderRoom();return;}

  // Remove old remote tiles & waiting placeholder
  var toRemove=[];
  for(var i=0;i<grid.children.length;i++){
    var c=grid.children[i];
    if(c.id!=='local-video'&&c.id!=='timer-overlay'){
      toRemove.push(c);
    }
  }
  // Keep local video tile (first child)
  var localTile=grid.children[0];

  // Clear all except local tile and overlay
  grid.innerHTML='';
  grid.appendChild(localTile);

  // Re-add remotes
  Object.keys(S.remotes).forEach(function(id){
    var rem=S.remotes[id];
    var tile=div('position:relative;background:#080b18;border-radius:10px;overflow:hidden;min-height:80px;');
    tile.id='tile-'+id;
    var v=rem.videoEl||document.createElement('video');
    v.autoplay=true;v.playsInline=true;
    v.setAttribute('playsinline','');
    v.style.cssText='width:100%;height:100%;object-fit:cover;';
    if(v.srcObject!==rem.stream) v.srcObject=rem.stream;
    rem.videoEl=v;
    tile.appendChild(v);
    var lbl=div('position:absolute;bottom:7px;left:7px;background:rgba(0,0,0,0.7);color:#6a7a8a;font-size:11px;padding:3px 9px;border-radius:6px;');
    lbl.textContent=rem.name;
    tile.appendChild(lbl);
    grid.appendChild(tile);
  });

  // Waiting placeholder
  var n=Object.keys(S.remotes).length;
  if(n===0){
    var waitEl=div('background:rgba(0,0,0,0.2);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;');
    waitEl.id='wait-placeholder';
    var waitTxt=div('color:#0e1c2e;font-size:14px;text-align:center;padding:0 24px;line-height:1.7;');
    waitTxt.textContent=S.isHost?'À espera de participantes…':'A ligar ao trainer…';
    waitEl.appendChild(waitTxt);
    if(S.errMsg){var e=div('color:#cc2244;font-size:12px;');e.textContent=S.errMsg;waitEl.appendChild(e);}
    grid.appendChild(waitEl);
  }

  // Timer overlay
  var overlay=div('position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:none;');
  overlay.id='timer-overlay';
  overlay.style.display=S.timerOn?'flex':'none';
  var pi=PHASE[S.timer.phase]||PHASE.idle;
  var box=div('backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:3px solid '+pi.color+';border-radius:34px;padding:38px 72px;text-align:center;min-width:290px;pointer-events:auto;animation:glow 2.4s ease-in-out infinite;background:'+pi.bg+';');
  box.id='timer-box';
  box.style.setProperty('--gc',pi.color+'44');
  renderTimerContent(box,pi);
  overlay.appendChild(box);
  grid.appendChild(overlay);

  updateGridCols();
  updatePcount();
}

function updateGridCols(){
  var grid=document.getElementById('video-grid');
  if(!grid) return;
  var n=1+Object.keys(S.remotes).length;
  var cols=n===1?1:n<=2?2:n<=4?2:3;
  grid.style.gridTemplateColumns='repeat('+cols+',1fr)';
}
function updatePcount(){
  var n=Object.keys(S.remotes).length;
  var pc=document.getElementById('pcount');
  if(pc){pc.style.display=n?'inline-block':'none';pc.textContent='👥 '+n;}
  var pp=document.getElementById('panel-pcount');
  if(pp) pp.textContent=n===0?'— Aguarda a ligação dos clientes —':n+' cliente'+(n>1?'s':'')+' ligado'+(n>1?'s':'');
}
function setStatus(txt){
  var el=document.getElementById('room-status');
  if(el) el.textContent=txt?'· '+txt:'';
}
function setErr(txt){
  var el=document.getElementById('room-err');
  if(el) el.textContent=txt||'';
}
function renderPanel(){
  var p=document.getElementById('timer-panel');
  if(!p) return;
  if(S.panelOpen){buildPanel(p);p.style.display='block';}
  else p.style.display='none';
}
function toggleTimerBtn(){
  var b=document.getElementById('timer-toggle-btn');
  if(!b) return;
  b.style.background=S.panelOpen?'#00ff88':'rgba(255,255,255,0.04)';
  b.style.color=S.panelOpen?'#000':'#2a3a4a';
  b.style.borderColor=S.panelOpen?'#00ff88':'rgba(255,255,255,0.07)';
}

/* ══════════════════════════════════
   MAIN RENDER
══════════════════════════════════ */
function render(){
  if(S.page==='landing') renderLanding();
  else renderRoom();
}

// Read ?room= from URL
var urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom) S.roomId=urlRoom;

// Init
render();
</script>
