<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Perfektus Training Room</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#03050a;color:#fff;overflow:hidden}
button{font-family:inherit;cursor:pointer;transition:opacity .15s;border:none;outline:none}
button:hover:not(:disabled){opacity:.82}
input{font-family:inherit;outline:none;color:#fff}
input::placeholder{color:#1a2a38}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes glow{0%,100%{box-shadow:0 0 60px var(--gc,rgba(0,255,136,.25)),0 40px 100px rgba(0,0,0,.9)}50%{box-shadow:0 0 130px var(--gc,rgba(0,255,136,.42)),0 40px 100px rgba(0,0,0,.9)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:rgba(0,255,136,.15);border-radius:2px}
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ══ AUDIO ══ */
function beep(hz,dur,vol){
  try{
    var ac=new(window.AudioContext||window.webkitAudioContext)();
    var o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.frequency.value=hz||880;o.type='sine';
    g.gain.setValueAtTime(vol||.5,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+(dur||.18));
    o.start();o.stop(ac.currentTime+(dur||.18)+.05);
    setTimeout(function(){try{ac.close();}catch(e){};},(((dur||.18)+.2)*1000));
  }catch(e){}
}
function fanfare(){beep(880,.1,.7);setTimeout(function(){beep(1100,.1,.6);},180);setTimeout(function(){beep(1320,.85,.8);},360);}

/* ══ HELPERS ══ */
function fmt(s){if(s>=60)return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;return s<10?'0'+s:''+s;}

// Strip everything except letters and numbers — guaranteed valid PeerJS ID
function toRoomCode(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}

function el(tag,css){var e=document.createElement(tag);if(css)e.style.cssText=css;return e;}
function div(css){return el('div',css);}
function btn(text,css,onclick){var b=el('button',css);b.innerHTML=text;if(onclick)b.onclick=onclick;return b;}

function loadPeer(cb){
  if(window.Peer){cb();return;}
  var s=document.createElement('script');
  s.src='https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
  s.onload=cb;
  s.onerror=function(){
    // fallback CDN
    var s2=document.createElement('script');
    s2.src='https://cdn.jsdelivr.net/npm/peerjs@1.5.2/dist/peerjs.min.js';
    s2.onload=cb;
    document.head.appendChild(s2);
  };
  document.head.appendChild(s);
}

/* ══ STATE ══ */
var S={
  page:'landing',isHost:false,roomId:'',myName:'',
  status:'',statusType:'info', // type: info|ok|err
  remotes:{},
  cfg:{work:40,rest:20,rounds:8},
  timer:{phase:'idle',round:0,total:0,left:0},
  timerOn:false,panelOpen:false,
  peer:null,calls:{},conns:{},localStream:null,timerIv:null,ts:{},
};

/* ══ TIMER ══ */
function killTimer(){clearInterval(S.timerIv);}

function applyCmd(cmd){
  if(cmd.action==='stop'){killTimer();S.timerOn=false;S.timer.phase='idle';S.timer.left=0;updateTimerOverlay();return;}
  if(cmd.action==='reset'){killTimer();S.timerOn=false;S.timer={phase:'idle',round:0,total:0,left:0};updateTimerOverlay();return;}
  if(cmd.action==='start'){
    killTimer();
    var w=cmd.work,r=cmd.rest,rds=cmd.rounds;
    S.ts={phase:'work',round:1,work:w,rest:r,total:rds,left:w};
    S.timerOn=true;S.timer={phase:'work',round:1,total:rds,left:w};
    showTimerOverlay();beep(880,.4,.8);
    S.timerIv=setInterval(function(){
      var ts=S.ts;ts.left-=1;
      if(ts.left>0&&ts.left<=3)beep(660,.06,.28);
      if(ts.left<=0){
        if(ts.phase==='work'){
          if(ts.round>=ts.total){clearInterval(S.timerIv);ts.phase='done';S.timer={phase:'done',round:ts.round,total:ts.total,left:0};showTimerOverlay();fanfare();return;}
          ts.phase='rest';ts.left=ts.rest;S.timer={phase:'rest',round:ts.round,total:ts.total,left:ts.rest};beep(440,.3,.5);
        } else {ts.round++;ts.phase='work';ts.left=ts.work;S.timer={phase:'work',round:ts.round,total:ts.total,left:ts.work};beep(880,.4,.8);}
        showTimerOverlay();
      } else {
        S.timer.left=ts.left;
        var bn=document.getElementById('t-big');if(bn)bn.textContent=fmt(ts.left);
      }
    },1000);
  }
}
function bcast(cmd){Object.values(S.conns).forEach(function(c){try{c.send(cmd);}catch(e){}}); }

/* ══ PHASE CONFIG ══ */
var PH={idle:{c:'#2a3a50',l:'PRONTO',bg:'rgba(20,35,55,0.6)'},work:{c:'#00ff88',l:'💪 TRABALHO',bg:'rgba(0,255,136,0.1)'},rest:{c:'#ff3d5a',l:'😤 DESCANSO',bg:'rgba(255,61,90,0.1)'},done:{c:'#ffd700',l:'🏆 COMPLETO!',bg:'rgba(255,215,0,0.1)'}};
var PRESETS=[{n:'Tabata',w:20,r:10,rds:8},{n:'40/20',w:40,r:20,rds:8},{n:'30/30',w:30,r:30,rds:10},{n:'Boxe 3′',w:180,r:60,rds:6},{n:'AMRAP 5′',w:300,r:60,rds:5},{n:'Sprint 15/45',w:15,r:45,rds:12}];

/* ══ JOIN ══ */
function joinRoom(asHost){
  if(!S.roomId.trim())return;
  var code=toRoomCode(S.roomId);
  if(!code){setStatus('❌ Nome de sala inválido — usa letras e números.','err');return;}

  S.isHost=asHost;S.page='room';
  setStatus('📷 A iniciar câmara...','info');
  render();

  navigator.mediaDevices.getUserMedia({video:true,audio:true}).then(function(stream){
    S.localStream=stream;
    var lv=document.getElementById('local-video');
    if(lv)lv.srcObject=stream;
    setStatus('🔌 A ligar...','info');

    loadPeer(function(){
      var hostId='pm'+code+'host';
      var myId=asHost?hostId:'pm'+code+'p'+Date.now();

      setStatus('🔌 A registar na rede ('+(asHost?hostId:myId)+')...','info');

      var peer=new window.Peer(myId,{
        debug:0,
        config:{iceServers:[
          {urls:'stun:stun.l.google.com:19302'},
          {urls:'stun:stun1.l.google.com:19302'},
          {urls:'stun:stun.cloudflare.com:3478'},
        ]}
      });
      S.peer=peer;

      peer.on('open',function(id){
        setStatus(asHost?'✅ Sala aberta — a aguardar clientes...':'✅ Sala encontrada! A ligar ao vídeo...','ok');

        if(!asHost){
          // Connect data channel
          var conn=peer.connect(hostId,{reliable:true,metadata:{name:S.myName||'Participante'}});
          conn.on('open',function(){
            S.conns[hostId]=conn;
            conn.on('data',applyCmd);
            conn.on('close',function(){delete S.conns[hostId];});
          });
          // Call for video
          var call=peer.call(hostId,stream,{metadata:{name:S.myName||'Participante'}});
          if(call){
            S.calls[hostId]=call;
            call.on('stream',function(rs){addRemote(hostId,'Trainer',rs);setStatus('','ok');});
            call.on('close',function(){removeRemote(hostId);});
          }
        }
      });

      peer.on('connection',function(conn){
        var name=conn.metadata&&conn.metadata.name?conn.metadata.name:'Participante';
        S.conns[conn.peer]=conn;
        conn.on('close',function(){delete S.conns[conn.peer];removeRemote(conn.peer);});
        setTimeout(function(){
          if(!S.peer)return;
          var call=S.peer.call(conn.peer,stream,{metadata:{name:S.myName||'Trainer'}});
          if(call){
            call.on('stream',function(rs){S.calls[conn.peer]=call;addRemote(conn.peer,name,rs);setStatus('','ok');});
            call.on('close',function(){delete S.calls[conn.peer];removeRemote(conn.peer);});
          }
        },600);
      });

      peer.on('call',function(call){
        call.answer(stream);
        var name=call.metadata&&call.metadata.name?call.metadata.name:(asHost?'Participante':'Trainer');
        call.on('stream',function(rs){S.calls[call.peer]=call;addRemote(call.peer,name,rs);setStatus('','ok');});
        call.on('close',function(){delete S.calls[call.peer];removeRemote(call.peer);});
      });

      peer.on('error',function(err){
        var msgs={
          'unavailable-id':'❌ Sala já ocupada — escolhe outro nome.',
          'peer-unavailable':'❌ Trainer não encontrado. Certifica-te que o Trainer já está na sala.',
          'invalid-id':'❌ Nome de sala inválido — usa apenas letras e números.',
          'network':'❌ Erro de rede. Verifica a tua ligação à internet.',
          'disconnected':'❌ Desligado da rede de sinalização.',
          'server-error':'❌ Servidor PeerJS indisponível. Tenta novamente.',
          'socket-error':'❌ Erro de socket. Verifica a tua ligação.',
        };
        setStatus(msgs[err.type]||('❌ Erro: '+err.type+' — '+err.message),'err');
      });
    });
  }).catch(function(e){
    S.page='landing';
    S.status=e.name==='NotAllowedError'?'❌ Câmara/microfone bloqueado pelo browser.':'❌ '+e.message;
    S.statusType='err';
    render();
  });
}

function addRemote(id,name,stream){
  var v=document.createElement('video');
  v.autoplay=true;v.playsInline=true;v.setAttribute('playsinline','');
  v.style.cssText='width:100%;height:100%;object-fit:cover;';
  v.srcObject=stream;
  S.remotes[id]={name:name,stream:stream,videoEl:v};
  rebuildGrid();
}
function removeRemote(id){delete S.remotes[id];rebuildGrid();}

function leaveRoom(){
  killTimer();
  if(S.localStream)S.localStream.getTracks().forEach(function(t){t.stop();});
  if(S.peer)S.peer.destroy();
  S.peer=null;S.calls={};S.conns={};S.localStream=null;
  S.remotes={};S.timerOn=false;S.panelOpen=false;
  S.timer={phase:'idle',round:0,total:0,left:0};
  S.page='landing';S.status='';S.statusType='info';
  render();
}

/* ══ STATUS HELPERS ══ */
function setStatus(txt,type){
  S.status=txt;S.statusType=type||'info';
  var el=document.getElementById('room-status');
  if(!el)return;
  el.textContent=txt;
  el.style.color=type==='err'?'#ff6070':type==='ok'?'#00cc66':'#2a4a6a';
}

/* ══ TIMER OVERLAY ══ */
function showTimerOverlay(){
  var overlay=document.getElementById('timer-overlay');
  if(!overlay)return;
  var pi=PH[S.timer.phase]||PH.idle;
  overlay.style.display='flex';
  var box=document.getElementById('timer-box');
  if(box){
    box.style.borderColor=pi.c;
    box.style.background=pi.bg;
    box.style.setProperty('--gc',pi.c+'44');
  }
  renderTimerContent();
}
function updateTimerOverlay(){
  var overlay=document.getElementById('timer-overlay');
  if(overlay)overlay.style.display=S.timerOn?'flex':'none';
  if(S.timerOn)showTimerOverlay();
}

function renderTimerContent(){
  var box=document.getElementById('timer-box');
  if(!box)return;
  box.innerHTML='';
  var pi=PH[S.timer.phase]||PH.idle;
  // Phase label
  var pl=div('font-size:11px;font-weight:800;letter-spacing:5px;margin-bottom:8px;color:'+pi.c);
  pl.textContent=pi.l;box.appendChild(pl);
  // Big number
  var bn=div('color:#fff;font-size:'+(S.timer.phase==='done'?'74':'104')+'px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;letter-spacing:-4px;text-shadow:0 0 70px '+pi.c+'80,0 4px 16px rgba(0,0,0,.95);');
  bn.id='t-big';bn.textContent=S.timer.phase==='done'?'🏆':fmt(S.timer.left);box.appendChild(bn);
  // Round
  if(S.timer.phase==='work'||S.timer.phase==='rest'){
    var ri=div('color:#1a2a3a;font-size:13px;margin-top:12px;letter-spacing:1px');
    ri.innerHTML='ROUND <b style="color:'+pi.c+';font-size:16px">'+S.timer.round+'</b> / '+S.timer.total;
    box.appendChild(ri);
  }
  if(S.timer.phase==='done'){
    var dl=div('color:#ffd700;font-size:20px;font-weight:800;margin-top:12px;');
    dl.textContent='SESSÃO COMPLETA!';box.appendChild(dl);
    var cb=btn('Fechar ✕','margin-top:20px;background:rgba(255,215,0,0.12);border:1px solid rgba(255,215,0,0.28);color:#ffd700;border-radius:10px;padding:7px 24px;font-size:12px;font-weight:700;');
    cb.onclick=function(){S.timerOn=false;S.timer={phase:'idle',round:0,total:0,left:0};updateTimerOverlay();};
    box.appendChild(cb);
  }
  // Dots
  if(S.timer.total>0&&S.timer.total<=20&&S.timer.phase!=='done'){
    var dots=div('display:flex;flex-wrap:wrap;justify-content:center;gap:5px;margin-top:16px;max-width:240px;margin-left:auto;margin-right:auto;');
    for(var i=0;i<S.timer.total;i++){
      var d=div('border-radius:50%;flex-shrink:0;');
      var cur=i===S.timer.round-1,done=i<S.timer.round-1;
      d.style.width=(cur?11:7)+'px';d.style.height=(cur?11:7)+'px';
      d.style.background=done?'#1a3a28':cur?pi.c:'rgba(255,255,255,0.07)';
      dots.appendChild(d);
    }
    box.appendChild(dots);
  }
}

/* ══ RENDER LANDING ══ */
function renderLanding(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.style.cssText='min-height:100vh;background:radial-gradient(ellipse 90% 70% at 40% 30%,#091828 0%,#030508 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;overflow-y:auto;';

  var logo=div('text-align:center;margin-bottom:40px;');
  logo.innerHTML='<div style="font-size:54px;filter:drop-shadow(0 0 28px rgba(0,255,136,.6));line-height:1">⚡</div>'
    +'<div style="color:#00ff88;font-weight:900;font-size:26px;letter-spacing:10px;margin-top:10px;text-shadow:0 0 40px rgba(0,255,136,.4)">PERFEKTUS</div>'
    +'<div style="color:#0d1e2a;font-size:10px;letter-spacing:6px;margin-top:4px">TRAINING ROOM</div>';
  app.appendChild(logo);

  var card=div('background:rgba(255,255,255,0.022);border:1px solid rgba(255,255,255,0.07);border-radius:24px;padding:32px 34px;width:100%;max-width:420px;box-shadow:0 30px 100px rgba(0,0,0,.8);');
  app.appendChild(card);

  // Status/error
  if(S.status){
    var sd=div('background:rgba(255,40,70,0.09);border:1px solid rgba(255,40,70,0.18);border-radius:10px;padding:10px 14px;margin-bottom:16px;color:#ff8090;font-size:13px');
    sd.textContent=S.status;card.appendChild(sd);S.status='';
  }

  function labelDiv(txt){var l=div('color:#0e1c28;font-size:10px;letter-spacing:2.5px;margin-bottom:7px');l.textContent=txt;return l;}
  function inputEl(placeholder,val,onchange){
    var i=document.createElement('input');
    i.type='text';i.placeholder=placeholder;i.value=val||'';
    i.style.cssText='width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:12px 16px;color:#fff;font-size:15px;margin-bottom:16px;display:block;';
    i.oninput=onchange;return i;
  }

  card.appendChild(labelDiv('NOME DA SALA'));
  var roomInp=inputEl('ex: joaotreino (sem espaços ou hífens)',S.roomId,function(){
    S.roomId=this.value.toLowerCase().replace(/[^a-z0-9]/g,'');
    this.value=S.roomId;
    updateShareLinkEl();
  });
  card.appendChild(roomInp);

  // Room code preview
  var codePreview=div('color:#007744;font-size:10px;margin-top:-12px;margin-bottom:14px;padding-left:4px;min-height:14px;');
  codePreview.id='code-preview';
  if(S.roomId) codePreview.textContent='Código da sala: pmm'+S.roomId+'host';
  card.appendChild(codePreview);

  card.appendChild(labelDiv('O TEU NOME'));
  var nameInp=inputEl('ex: João',S.myName,function(){S.myName=this.value;});

  card.appendChild(nameInp);

  var trainerBtn=btn('⚡ ENTRAR COMO TRAINER','width:100%;padding:14px;margin-top:4px;background:#00ff88;color:#000;border-radius:14px;font-weight:900;font-size:14px;letter-spacing:1px;');
  trainerBtn.onclick=function(){S.myName=nameInp.value;joinRoom(true);};
  card.appendChild(trainerBtn);

  card.appendChild(div('height:8px'));

  var partBtn=btn('ENTRAR COMO PARTICIPANTE','width:100%;padding:13px;background:transparent;color:#00ff88;border:1px solid rgba(0,255,136,0.28);border-radius:14px;font-weight:600;font-size:13px;');
  partBtn.onclick=function(){S.myName=nameInp.value;joinRoom(false);};
  card.appendChild(partBtn);

  // Share link
  var shareBox=div('margin-top:24px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.045);');
  var slabel=div('color:#0d1a24;font-size:9px;letter-spacing:2.5px;margin-bottom:8px');
  slabel.textContent='LINK PARA ENVIAR AOS CLIENTES';shareBox.appendChild(slabel);
  var linkRow=div('background:rgba(0,255,136,0.04);border:1px solid rgba(0,255,136,0.11);border-radius:10px;padding:9px 12px;display:flex;align-items:center;gap:8px;');
  var linkSpan=el('span','color:#0a6a45;font-size:11px;flex:1;word-break:break-all;line-height:1.5;');
  linkSpan.id='share-link-text';
  linkSpan.textContent=getShareUrl(S.roomId);
  var copyBtn=btn('📋','background:rgba(0,255,136,0.15);border:none;color:#00ff88;border-radius:6px;padding:5px 10px;font-size:14px;flex-shrink:0;');
  copyBtn.onclick=function(){navigator.clipboard.writeText(document.getElementById('share-link-text').textContent).catch(function(){});copyBtn.textContent='✅';setTimeout(function(){copyBtn.textContent='📋';},1500);};
  linkRow.appendChild(linkSpan);linkRow.appendChild(copyBtn);shareBox.appendChild(linkRow);
  card.appendChild(shareBox);

  // Note about room name
  var note=div('margin-top:12px;color:#06121e;font-size:10px;line-height:1.7;text-align:center;');
  note.textContent='Usa apenas letras e números no nome da sala (sem espaços ou hífens)';
  card.appendChild(note);

  function updateShareLinkEl(){
    var el=document.getElementById('share-link-text');
    if(el)el.textContent=getShareUrl(S.roomId);
    var cp=document.getElementById('code-preview');
    if(cp)cp.textContent=S.roomId?'Código da sala: pm'+S.roomId+'host':'';
  }
}

function getShareUrl(roomId){return location.origin+location.pathname+(roomId?'?room='+encodeURIComponent(roomId):'?room=');}

/* ══ RENDER ROOM ══ */
function renderRoom(){
  var app=document.getElementById('app');
  app.innerHTML='';
  app.style.cssText='position:fixed;inset:0;background:#03050a;display:flex;flex-direction:column;overflow:hidden;';

  /* TOP BAR */
  var bar=div('display:flex;align-items:center;gap:8px;padding:7px 14px;background:rgba(2,4,9,0.98);border-bottom:1px solid rgba(0,255,136,0.07);flex-shrink:0;z-index:20;');
  bar.innerHTML='<span style="color:#00ff88;font-weight:900;font-size:17px;filter:drop-shadow(0 0 8px rgba(0,255,136,.6))">⚡</span>'
    +'<span style="color:#00cc66;font-weight:800;font-size:11px;letter-spacing:4px">PERFEKTUS</span>'
    +'<span style="color:#0c1a26;font-size:10px;margin:0 2px">|</span>'
    +'<span style="color:#172535;font-size:10px">'+S.roomId+'</span>';
  if(S.isHost){var chip=el('span','background:rgba(0,255,136,0.1);color:#009955;font-size:9px;padding:2px 8px;border-radius:4px;letter-spacing:2px;font-weight:700');chip.textContent='TRAINER';bar.appendChild(chip);}
  var statusEl=el('span','font-size:10px;margin-left:2px;');statusEl.id='room-status';statusEl.textContent=S.status;
  statusEl.style.color=S.statusType==='err'?'#ff6070':S.statusType==='ok'?'#00cc66':'#2a4a6a';
  bar.appendChild(statusEl);
  var br=div('margin-left:auto;display:flex;gap:6px;align-items:center;');
  var pc=el('span','background:rgba(0,255,136,0.07);border:1px solid rgba(0,255,136,0.1);color:#007744;font-size:10px;padding:3px 8px;border-radius:6px;display:none;');
  pc.id='pcount';br.appendChild(pc);
  var linkBtn=btn('📋','background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#2a3a4a;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;');
  linkBtn.onclick=function(){navigator.clipboard.writeText(getShareUrl(S.roomId)).catch(function(){});linkBtn.textContent='✅';setTimeout(function(){linkBtn.textContent='📋';},1500);};
  br.appendChild(linkBtn);
  if(S.isHost){
    var tb=btn('⏱ Timer','background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#2a3a4a;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;');
    tb.id='timer-toggle-btn';
    tb.onclick=function(){S.panelOpen=!S.panelOpen;var p=document.getElementById('timer-panel');if(p)p.style.display=S.panelOpen?'block':'none';tb.style.background=S.panelOpen?'#00ff88':'rgba(255,255,255,0.04)';tb.style.color=S.panelOpen?'#000':'#2a3a4a';};
    br.appendChild(tb);
  }
  bar.appendChild(br);app.appendChild(bar);

  /* GRID */
  var grid=div('flex:1;display:grid;gap:3px;padding:3px;background:#02040a;position:relative;overflow:hidden;grid-template-columns:1fr;');
  grid.id='video-grid';app.appendChild(grid);

  // Local tile
  var lt=div('position:relative;background:#080b18;border-radius:10px;overflow:hidden;min-height:80px;');
  lt.id='local-tile';
  var lv=document.createElement('video');lv.autoplay=true;lv.muted=true;lv.playsInline=true;lv.setAttribute('playsinline','');
  lv.id='local-video';lv.style.cssText='width:100%;height:100%;object-fit:cover;transform:scaleX(-1);';
  if(S.localStream)lv.srcObject=S.localStream;
  lt.appendChild(lv);
  var ll=div('position:absolute;bottom:7px;left:7px;background:rgba(0,0,0,0.7);color:#6a7a8a;font-size:11px;padding:3px 9px;border-radius:6px;');
  ll.textContent=S.myName||(S.isHost?'Tu (Trainer)':'Tu');lt.appendChild(ll);
  grid.appendChild(lt);

  // Waiting
  var wt=div('background:rgba(0,0,0,0.18);border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;');
  wt.id='wait-tile';
  var sp=div('width:30px;height:30px;border:3px solid rgba(0,255,136,0.15);border-top-color:#00ff88;border-radius:50%;animation:spin .9s linear infinite;');
  var wm=div('color:#0e1c2e;font-size:13px;text-align:center;padding:0 20px;line-height:1.7;');
  wm.id='wait-msg';wm.textContent=S.status||'A ligar...';
  wt.appendChild(sp);wt.appendChild(wm);grid.appendChild(wt);

  // Timer overlay
  var overlay=div('position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;pointer-events:none;');
  overlay.id='timer-overlay';
  var pi=PH.idle;
  var tbox=div('backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:3px solid '+pi.c+';border-radius:34px;padding:38px 72px;text-align:center;min-width:280px;pointer-events:auto;animation:glow 2.4s ease-in-out infinite;background:'+pi.bg+';');
  tbox.id='timer-box';tbox.style.setProperty('--gc',pi.c+'44');
  overlay.appendChild(tbox);grid.appendChild(overlay);
  if(S.timerOn){overlay.style.display='flex';renderTimerContent();}

  /* TIMER PANEL */
  var panel=div('position:fixed;bottom:76px;right:18px;z-index:300;background:rgba(2,5,13,0.99);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);border:1px solid rgba(0,255,136,0.18);border-radius:22px;padding:22px 24px;width:310px;box-shadow:0 24px 80px rgba(0,0,0,.95);display:none;');
  panel.id='timer-panel';
  buildPanel(panel);app.appendChild(panel);

  /* BOTTOM BAR */
  var bot=div('display:flex;align-items:center;justify-content:center;gap:10px;padding:10px 20px;background:rgba(2,4,9,0.98);border-top:1px solid rgba(255,255,255,0.03);flex-shrink:0;z-index:20;');
  var micBtn=btn('🎙️','background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#8a9aaa;padding:8px 14px;border-radius:50px;font-size:14px;');
  var micLbl=document.createElement('div');micLbl.textContent='Mic';micLbl.style.cssText='font-size:9px;color:#8a9aaa;margin-top:2px;';
  micBtn.appendChild(micLbl);
  micBtn.onclick=function(){var t=S.localStream&&S.localStream.getAudioTracks()[0];if(t){t.enabled=!t.enabled;micBtn.childNodes[0].nodeValue=t.enabled?'🎙️':'🔇';micLbl.textContent=t.enabled?'Mic':'Mudo';}};
  var camBtn=btn('📷','background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);color:#8a9aaa;padding:8px 14px;border-radius:50px;font-size:14px;');
  var camLbl=document.createElement('div');camLbl.textContent='Câmara';camLbl.style.cssText='font-size:9px;color:#8a9aaa;margin-top:2px;';
  camBtn.appendChild(camLbl);
  camBtn.onclick=function(){var t=S.localStream&&S.localStream.getVideoTracks()[0];if(t){t.enabled=!t.enabled;var lv2=document.getElementById('local-video');if(lv2)lv2.style.opacity=t.enabled?1:0.12;}};
  var leaveBtn=btn('📵 Sair','background:rgba(255,30,60,0.14);color:#ff3d5a;border:1px solid rgba(255,30,60,0.25);padding:10px 24px;border-radius:50px;font-weight:700;font-size:13px;');
  leaveBtn.onclick=leaveRoom;
  bot.appendChild(micBtn);bot.appendChild(camBtn);bot.appendChild(leaveBtn);
  app.appendChild(bot);
}

function rebuildGrid(){
  var grid=document.getElementById('video-grid');
  if(!grid){renderRoom();return;}
  var n=Object.keys(S.remotes).length;
  var cols=n===0?1:n===1?2:n<=3?2:3;
  grid.style.gridTemplateColumns='repeat('+cols+',1fr)';

  // Remove old remote tiles
  var oldTiles=grid.querySelectorAll('.remote-tile');
  oldTiles.forEach(function(t){t.parentNode.removeChild(t);});

  // Remove overlay (will re-add at end)
  var oldOverlay=document.getElementById('timer-overlay');
  if(oldOverlay)oldOverlay.parentNode.removeChild(oldOverlay);

  var wt=document.getElementById('wait-tile');
  if(wt)wt.style.display=n===0?'flex':'none';

  Object.keys(S.remotes).forEach(function(id){
    var rem=S.remotes[id];
    var tile=div('position:relative;background:#080b18;border-radius:10px;overflow:hidden;min-height:80px;');
    tile.className='remote-tile';tile.id='tile-'+id;
    var v=rem.videoEl;
    if(!v){v=document.createElement('video');v.autoplay=true;v.playsInline=true;v.setAttribute('playsinline','');v.style.cssText='width:100%;height:100%;object-fit:cover;';v.srcObject=rem.stream;rem.videoEl=v;}
    if(v.srcObject!==rem.stream)v.srcObject=rem.stream;
    tile.appendChild(v);
    var lbl=div('position:absolute;bottom:7px;left:7px;background:rgba(0,0,0,0.7);color:#6a7a8a;font-size:11px;padding:3px 9px;border-radius:6px;');
    lbl.textContent=rem.name;tile.appendChild(lbl);
    grid.appendChild(tile);
  });

  // Re-add overlay
  var pi=PH[S.timer.phase]||PH.idle;
  var overlay=div('position:absolute;inset:0;z-index:50;display:'+(S.timerOn?'flex':'none')+';align-items:center;justify-content:center;pointer-events:none;');
  overlay.id='timer-overlay';
  var tbox=div('backdrop-filter:blur(36px) saturate(200%);-webkit-backdrop-filter:blur(36px) saturate(200%);border:3px solid '+pi.c+';border-radius:34px;padding:38px 72px;text-align:center;min-width:280px;pointer-events:auto;animation:glow 2.4s ease-in-out infinite;background:'+pi.bg+';');
  tbox.id='timer-box';tbox.style.setProperty('--gc',pi.c+'44');
  if(S.timerOn)renderTimerContent();
  overlay.appendChild(tbox);grid.appendChild(overlay);

  // Update count
  var pc=document.getElementById('pcount');
  if(pc){pc.style.display=n?'inline-block':'none';pc.textContent='👥 '+n;}
  var pp=document.getElementById('panel-pcount');
  if(pp)pp.textContent=n===0?'— À espera de clientes —':n+' cliente'+(n>1?'s':'')+' ligado'+(n>1?'s':'');
}

function buildPanel(panel){
  panel.innerHTML='';
  var hdr=div('display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;');
  var title=el('span','color:#00ff88;font-weight:900;font-size:13px;letter-spacing:3px;');title.textContent='⚡ HIIT TIMER';
  var cx=btn('✕','background:none;border:none;color:#1a2a38;font-size:18px;line-height:1;');
  cx.onclick=function(){S.panelOpen=false;var p=document.getElementById('timer-panel');if(p)p.style.display='none';var tb=document.getElementById('timer-toggle-btn');if(tb){tb.style.background='rgba(255,255,255,0.04)';tb.style.color='#2a3a4a';}};
  hdr.appendChild(title);hdr.appendChild(cx);panel.appendChild(hdr);

  [{k:'work',label:'TRABALHO (s)',step:5,min:5,max:300},{k:'rest',label:'DESCANSO (s)',step:5,min:5,max:300},{k:'rounds',label:'ROUNDS',step:1,min:1,max:40}].forEach(function(row){
    var w=div('margin-bottom:16px;');
    var l=div('color:#1a2838;font-size:10px;letter-spacing:2px;margin-bottom:6px');l.textContent=row.label;w.appendChild(l);
    var r=div('display:flex;align-items:center;gap:6px;');
    var minus=btn('−','width:36px;height:36px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#3a4a5a;border-radius:9px;font-size:20px;');
    var ve=div('flex:1;text-align:center;color:#fff;font-size:32px;font-weight:900;font-variant-numeric:tabular-nums;');
    ve.id='cfg-'+row.k;ve.textContent=S.cfg[row.k];
    var plus=btn('+','width:36px;height:36px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);color:#3a4a5a;border-radius:9px;font-size:20px;');
    (function(k,step,mn,mx,ve2){minus.onclick=function(){S.cfg[k]=Math.max(mn,S.cfg[k]-step);ve2.textContent=S.cfg[k];};plus.onclick=function(){S.cfg[k]=Math.min(mx,S.cfg[k]+step);ve2.textContent=S.cfg[k];};})(row.k,row.step,row.min,row.max,ve);
    r.appendChild(minus);r.appendChild(ve);r.appendChild(plus);w.appendChild(r);panel.appendChild(w);
  });

  // Presets
  var pw=div('margin-bottom:18px;');
  var pl=div('color:#0e1c28;font-size:10px;letter-spacing:2px;margin-bottom:8px');pl.textContent='PRESETS';pw.appendChild(pl);
  var pg=div('display:flex;flex-wrap:wrap;gap:5px;');
  PRESETS.forEach(function(p){
    var pb=btn(p.n,'background:rgba(0,255,136,0.06);border:1px solid rgba(0,255,136,0.15);color:#009955;padding:4px 10px;border-radius:7px;font-size:11px;font-weight:600;');
    pb.onclick=function(){S.cfg={work:p.w,rest:p.r,rounds:p.rds};['work','rest','rounds'].forEach(function(k){var e=document.getElementById('cfg-'+k);if(e)e.textContent=S.cfg[k];});};
    pg.appendChild(pb);
  });
  pw.appendChild(pg);panel.appendChild(pw);

  // Actions
  var ac=div('display:flex;gap:6px;margin-bottom:12px;');
  var startBtn=btn('▶ INICIAR','flex:1;background:#00ff88;color:#000;padding:12px 0;border-radius:12px;font-weight:900;font-size:14px;letter-spacing:1px;');
  startBtn.onclick=function(){var cmd={action:'start',work:S.cfg.work,rest:S.cfg.rest,rounds:S.cfg.rounds};bcast(cmd);applyCmd(cmd);};
  var pauseBtn=btn('⏸','background:rgba(255,61,90,0.12);color:#ff3d5a;border:1px solid rgba(255,61,90,0.2);padding:12px 14px;border-radius:12px;font-size:17px;');
  pauseBtn.onclick=function(){var c={action:'stop'};bcast(c);applyCmd(c);};
  var resetBtn=btn('↺','background:rgba(255,255,255,0.03);color:#1a2838;border:1px solid rgba(255,255,255,0.05);padding:12px 14px;border-radius:12px;font-size:15px;');
  resetBtn.onclick=function(){var c={action:'reset'};bcast(c);applyCmd(c);};
  ac.appendChild(startBtn);ac.appendChild(pauseBtn);ac.appendChild(resetBtn);panel.appendChild(ac);

  var pcnt=div('color:#0e1c28;font-size:11px;text-align:center;padding:8px 0;border-top:1px solid rgba(255,255,255,0.04);');
  pcnt.id='panel-pcount';
  var n=Object.keys(S.remotes).length;
  pcnt.textContent=n===0?'— À espera de clientes —':n+' cliente'+(n>1?'s':'')+' ligado'+(n>1?'s':'');
  panel.appendChild(pcnt);
}

/* ══ MAIN ══ */
function render(){
  if(S.page==='landing')renderLanding();
  else renderRoom();
}

var urlRoom=new URLSearchParams(location.search).get('room');
if(urlRoom)S.roomId=urlRoom;

render();
</script>
